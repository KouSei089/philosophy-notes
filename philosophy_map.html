// ─── helpers ─────────────────────────────────────────────────────
function f(n) { return (+n).toFixed(1); }

function qbez(id1, id2, arc) {
  const p1 = PHILS[id1], p2 = PHILS[id2];
  const dx = p2.x - p1.x, dy = p2.y - p1.y;
  const len = Math.sqrt(dx*dx + dy*dy);
  const ux = dx/len, uy = dy/len;
  const sx = p1.x + ux*R, sy = p1.y + uy*R;
  const ex = p2.x - ux*R, ey = p2.y - uy*R;
  const mx = (sx+ex)/2, my = (sy+ey)/2;
  const cx = mx, cy = my + arc;
  // midpoint on bezier at t=0.5
  const bx = 0.25*sx + 0.5*cx + 0.25*ex;
  const by = 0.25*sy + 0.5*cy + 0.25*ey;
  return {
    d: `M${f(sx)},${f(sy)} Q${f(cx)},${f(cy)} ${f(ex)},${f(ey)}`,
    lx: bx, ly: by
  };
}

// ─── render ───────────────────────────────────────────────────────
function renderMap() {
  let s = '';

  // defs
  s += '<defs>';
  const markers = [
    ['mkey',  '#7F77DD', 4],
    ['mpos',  '#AFA9EC', 4],
    ['mcr',   '#EF9F27', 4],
    ['mopp',  '#E24B4A', 4],
    ['mind',  '#C4C2BA', 4],
    ['myou',  '#97C459', 4],
  ];
  markers.forEach(([id, col, sw]) => {
    s += `<marker id="${id}" viewBox="0 0 12 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L10,5 L0,9" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>`;
  });
  s += '</defs>';

  // era bands
  ERAS.forEach(e => {
    s += `<rect x="${e.x1}" y="0" width="${e.x2-e.x1}" height="405" fill="${e.color}" opacity="0.9"/>`;
    s += `<text x="${(e.x1+e.x2)/2}" y="16" text-anchor="middle" font-size="10" fill="#bbb" font-family="-apple-system,'Hiragino Sans',sans-serif">${e.label}</text>`;
  });

  // timeline axis
  s += `<line x1="55" y1="404" x2="2105" y2="404" stroke="#ddd" stroke-width="0.8"/>`;

  // arrows (drawn first, under nodes)
  ARROWS.forEach(a => {
    const sty = ARROW_STYLE[a.type] || ARROW_STYLE.indirect;
    const markerMap = { key:'mkey', positive:'mpos', 'crit-recv':'mcr', oppose:'mopp', indirect:'mind', you:'myou' };
    const mid = qbez(a.f, a.t, a.arc);
    s += `<path d="${mid.d}" fill="none" stroke="${sty.stroke}" stroke-width="${sty.width}" stroke-dasharray="${sty.dash}" marker-end="url(#${markerMap[a.type] || 'mind'})" opacity="${a.type === 'indirect' ? 0.6 : 0.85}"/>`;
    if (a.label) {
      s += `<text x="${f(mid.lx)}" y="${f(mid.ly - 3)}" text-anchor="middle" font-size="9" fill="${sty.stroke}" opacity="0.9" font-family="-apple-system,'Hiragino Sans',sans-serif">${a.label}</text>`;
    }
  });

  // nodes + labels
  Object.entries(PHILS).forEach(([id, p]) => {
    const c = NODE_COLORS[p.type] || NODE_COLORS.gray;
    s += `<g class="node-circle" data-id="${id}" onclick="showDetail('${id}')">
      <circle cx="${p.x}" cy="${p.y}" r="${R}" fill="${c.fill}" stroke="${c.stroke}" stroke-width="1.5"/>
      <text x="${p.x}" y="${p.y + 2}" text-anchor="middle" dominant-baseline="middle" font-size="8.5" font-weight="600" fill="${c.text}" font-family="-apple-system,'Hiragino Sans',sans-serif">${p.name.length > 5 ? p.name.slice(0,5) : p.name}</text>
      <text x="${p.x}" y="${p.y + R + 11}" text-anchor="middle" font-size="10" fill="#333" font-family="-apple-system,'Hiragino Sans',sans-serif">${p.name}</text>
      <text x="${p.x}" y="${p.y + R + 21}" text-anchor="middle" font-size="9" fill="#aaa" font-family="-apple-system,'Hiragino Sans',sans-serif">${p.dates}</text>
    </g>`;
  });

  document.getElementById('map').innerHTML = s;
}

function showDetail(id) {
  const p = PHILS[id];
  const c = NODE_COLORS[p.type] || NODE_COLORS.gray;
  const volBadge = p.vol ? `<span class="d-vol">第${p.vol}巻</span>` : '';
  const tagsHtml = p.keys.map(k => `<span class="d-tag">${k}</span>`).join('');
  document.getElementById('detail').innerHTML = `
    <div>
      <span class="d-name" style="color:${c.stroke}">${p.name}</span>
      <span class="d-dates">${p.dates}</span>
      ${volBadge}
    </div>

    </div>

}
