const V = {
1:{cls:'v1',title:'哲学の誕生',sub:'古代ギリシャ①',period:'BC 600頃 – BC 300頃',depth:28,dlbl:'流し読みでOK——プラトンだけは理解する',
events:[{y:'BC 585',e:'タレス、日食を予言（最初の哲学者とされる）'},{y:'BC 469',e:'ソクラテス誕生'},{y:'BC 399',e:'ソクラテス処刑'},{y:'BC 387',e:'プラトン、アカデメイア創設'},{y:'BC 335',e:'アリストテレス、リュケイオン創設'}],
q:{t:'この時代の中心問い',b:'「世界の本当の姿（実在）とは何か」「私たちの認識はそれを正確に捉えられるか」——そして「どう生きるべきか」。哲学がこれらを「神話」ではなく「ロゴス（理性的言語）」で問い始めた最初の時代。'},
tide:`哲学は「神話（ミュトス）」から「ロゴス（理性的言語）」への転換として始まりました。「嵐はポセイドンが怒っているから来る」という説明を、「いや、これは自然現象として説明できるはずだ」と問い直した人々——タレス、アナクシマンドロス、ヘラクレイトス——が最初の哲学者です。

この時代に、のちの哲学史全体を予告する衝突が起きます。ヘラクレイトスは「万物は流転する、同じ川には二度と入れない」と言い、変化と差異こそが実在だと主張します。パルメニデスは逆に「真の存在は変化しない、変化するように見えるのは感覚の幻想だ」と言います。「変化vs不変」「差異vs同一」——この対立は驚くほどそのままドゥルーズとヘーゲルの対立に重なります。`,
persons:[
{name:'プラトン',dates:'BC 427–347',col:'#AFA9EC',
quote:'「哲学することは、よく死ぬことを学ぶことだ」',
body:`ソクラテスの弟子であり、西洋哲学の祖。彼が作り上げた「イデア論」は、その後2000年以上にわたって哲学の基本的な枠組みであり続けました。

「洞窟の比喩」が有名です。人間は洞窟の中で壁に映る影（現象）しか見ていない。本物（イデア）は洞窟の外にある——哲学者だけが洞窟を出て太陽（善のイデア）を見る。この比喩に、プラトンの哲学の全体が詰まっています。

また「オリジナル（イデア）・コピー（現象）・コピーのコピー（シミュラークル）」という階層を作り、シミュラークルを最も価値の低いものとして排除しました。この「シミュラークルの追放」がドゥルーズの最初の攻撃目標になります。`,
concepts:[
{t:'イデア（eidos）',b:'「美しいものは無数にあるが、美しさそのもの（美のイデア）は一つだ」——具体的な事物の背後にある「完全な原型」。イデアは永遠不変で、感覚ではなく理性（ヌース）によってのみ認識できる。'},
{t:'二世界論',b:'「現象界（見える世界）」と「イデア界（真の実在の世界）」の分離。哲学とは感覚の世界から抜け出し、理性でイデア界を認識することだ。この二元論がドゥルーズ批判の核心的な標的。'},
{t:'想起説（アナムネーシス）',b:'「学ぶとは思い出すことだ」——魂は生まれる前にイデア界を経験しており、学ぶとはその記憶を想起することだという学習論。'},
],
books:['国家','パイドン','メノン','饗宴','ソクラテスの弁明'],
misc:{t:'よくある誤解',b:'プラトン＝観念論者、現実逃避者というイメージがありますが、プラトンは政治にも深く関与し、実践的な哲学者でした。また「イデア」は「理想的なもの」ではなく「形相（かたち）」という意味に近く、椅子のイデアも存在します。'},
conn:{t:'他の哲学者との接続',b:'アリストテレスはプラトンの弟子でありながらイデア論を否定。スコトゥス（第3巻）は「存在の一義性」でプラトン的階層を解体。デカルト（第5巻）は「コギト」でイデアを主体に内面化。'},
},
{name:'アリストテレス',dates:'BC 384–322',col:'#AFA9EC',
quote:'「人間はポリス的動物である」',
body:`プラトンの弟子でありながら、師のイデア論を否定した哲学者。「形相（エイドス）は個物の中にある」というアリストテレスの主張は、プラトンが別の世界に置いたイデアをこの世界の中に引き戻す試みです。「プラトンは親しい友人だが、真理はより親しい友人だ」という言葉を残したとされます。

論理学・形而上学・倫理学・生物学・政治学——ほぼすべての学問領域を体系化しました。中世スコラ哲学では「哲学者」と言えばアリストテレスを指すほど圧倒的な権威を持ちます。`,
concepts:[
{t:'四原因説',b:'何かが「ある」ことには四つの原因がある——質料因（素材）、形相因（かたち）、作動因（きっかけ）、目的因（目的）。銅像で言えば：銅（質料）、像の形（形相）、彫刻家（作動）、記念のため（目的）。この「目的因」という発想がヘーゲルの目的論哲学の遠い先祖。'},
{t:'エウダイモニア（幸福・繁栄）',b:'「最高善」としての幸福は、快楽でも富でも名誉でもなく、人間固有の機能（理性）を卓越した形で発揮することだ——『ニコマコス倫理学』の核心。'},
{t:'可能態と現実態',b:'どんなものにも「なりうる状態（可能態、デュナミス）」と「実際にある状態（現実態、エネルゲイア）」がある。種は木の可能態。この概念がのちのスピノザの「コナトゥス」へつながる。'},
],
books:['ニコマコス倫理学','形而上学','政治学','詩学','霊魂論'],
conn:{t:'他の哲学者との接続',b:'トマス・アクィナス（第3巻）がアリストテレスをキリスト教神学に接続。ハイデガー（第10巻）はアリストテレスの存在論を再解釈して「存在と時間」へ向かった。'},
},
{name:'ヘラクレイトス',dates:'BC 535–475頃',col:'#9FE1CB',
quote:'「同じ川には二度と入れない。なぜなら常に新しい水が流れているから」',
body:`断片しか残っていない謎めいた哲学者。「万物は流転する（パンタ・レイ）」という言葉で知られますが、実際にその言葉は彼の断片には存在せず、後世の要約です。

彼の核心は「対立するものの調和」です。冷たいものと暖かいもの、生と死、昼と夜——これらは対立しているように見えて、互いに他方を必要としている。実在するのはこの対立の「緊張（テンション）」そのものです。

ドゥルーズはヘラクレイトスを差異の哲学の最初の表明者として高く評価します。「変化と差異こそが根本だ」——この直感がスピノザ、ニーチェを経てドゥルーズへと流れ込む「地下の水脈」の源泉です。`,
concepts:[
{t:'ロゴス（logos）',b:'万物を貫く合理的な法則・秩序。人間はロゴスに従うことで知恵を得るが、多くの人は気づかずに生きている。'},
{t:'対立の調和',b:'弓と竪琴は弦の張力（対立）によってのみ機能する——対立は破壊ではなく、存在の条件だ。差異は矛盾ではなく、生成の動力だ。'},
],
books:['断片（後世の収集による）'],
conn:{t:'他の哲学者との接続',b:'ニーチェ（第9巻）は「力への意志」という概念でヘラクレイトスを現代に蘇らせた。ドゥルーズはヘーゲルへの批判においてヘラクレイトスを参照する。'},
},
],
dlz:`「プラトンを逆転させること（renverser le platonisme）」——これがドゥルーズ哲学の最初の宣言です。

プラトンはオリジナル→コピー→シミュラークルという価値の階層を作り、シミュラークルを最下層に排除しました。ドゥルーズはこれを逆転させます。「シミュラークルこそが一次的なものだ。オリジナルと見なされてきたものこそ、後から作られた幻想に過ぎない」——これが『差異と反復』第5章の核心です。

ヘラクレイトスとパルメニデスの対立はそのままドゥルーズとヘーゲルの対立に重なります。ヘーゲルは差異を「矛盾として否定し、より高次の同一性へ統合する」——これはパルメニデス的です。ドゥルーズは「差異は否定ではない、それ自体で肯定的な力だ」——これはヘラクレイトス的です。`,
you:`あなたの文章の「はじめに」で「たのしいのに、生きたくない」という対立が書かれています。これはヘラクレイトス的な「対立の調和」の問いです——喜びと死への欲求が同時にある状態は矛盾なのか、それとも対立が同時に存在する生の実態なのか。プラトンなら「本当の喜び（イデア）に達していないから苦しいのだ」と言うでしょう。ドゥルーズなら「その対立が差異として生きられること、それ自体を肯定できないか」と問います。`,
nxt:{n:2,t:'次巻：帝国と賢者——哲学が「どう生きるか」へ向かう'}
},

2:{cls:'v2',title:'帝国と賢者',sub:'古代ギリシャ②・ローマ',period:'BC 300頃 – AD 500頃',depth:22,dlbl:'流し読みでOK——ストア派だけ記憶する',
events:[{y:'BC 323',e:'アレクサンドロス大王死去。ヘレニズム時代始まる'},{y:'BC 306',e:'エピクロス、アテナイに「庭（ケポス）」学派創設'},{y:'BC 300',e:'ゼノン、ストア哲学創設'},{y:'AD 161',e:'マルクス・アウレリウス、ローマ皇帝兼哲学者に'},{y:'AD 270',e:'プロティノス没。新プラトン主義の頂点'}],
q:{t:'この時代の中心問い',b:'「世界の本質とは何か」から「どうすれば幸福に生きられるか」へ。個人がポリス（共同体）を失い、巨大帝国の中で孤立した時代——哲学は「心の平静（アタラクシア）」を目指す実践的な術となった。'},
tide:`アレクサンドロス大王の征服によって、ギリシャ哲学は地中海世界全体に広がります。同時に、都市国家（ポリス）が崩壊し、個人が巨大な帝国の中に孤立する時代が来ました。哲学の問いが変わります——「世界の真理とは何か」から「どう生きるか」へ。

三大学派の答えは対照的です。ストア派は「自然（ロゴス）に従い、感情を理性でコントロールせよ」、エピクロス派は「欲望を減らし、友人と穏やかに生きよ」、懐疑派は「すべての判断を保留し、心の平静を得よ」。

ローマ時代のストア哲学（セネカ・エピクテトス・マルクス・アウレリウス）は実践倫理として洗練され、現代でも読まれ続けています。`,
persons:[
{name:'ストア派（ゼノン・エピクテトス・マルクス・アウレリウス）',dates:'BC 300 – AD 180',col:'#AFA9EC',
quote:'「我々の力の及ぶものと及ばないものを区別せよ」（エピクテトス『エンケイリディオン』）',
body:`ストア哲学の核心は「私たちの力の及ぶものと及ばないものを区別する」ことです。天気、他人の反応、自分の死——これらは力が及ばない。力が及ぶのは「自分の判断と意志」だけ。力の及ばないことへの欲望を捨て、力の及ぶことに集中する——これがストア的な生き方です。

注目すべきは「出来事（エヴェネマン）」の概念です。ストア派は世界を「物体（原因）」と「出来事（結果）」に分け、「切る」という動詞が表す「切断という出来事」を、ナイフや木という物体とは異なる次元に置きました——出来事は非物体的なものです。

マルクス・アウレリウス（ローマ皇帝）の『自省録』は、権力の頂点にいながら「外側ではなく内側を耕せ」と書いた哲学書。プレッシャーと苦しみの中でどう生きるかを実践した記録です。`,
concepts:[
{t:'アパテイア（無情念）',b:'感情を消すことではなく、感情に支配されない状態。嵐の中で揺れない錨のようなもの。ただしストアは感情そのものを否定したわけではなく、「適切な感情（エウパテイア）」を認めていた。'},
{t:'出来事（エヴェネマン）の哲学',b:'物体（原因の世界）と出来事（結果・表面の世界）の区別。この区別をドゥルーズが『意味の論理学』（1969）で現代に蘇らせる。「起きたこと（出来事）をそのまま意志すること」がストア的倫理であり、ドゥルーズの「amor fati（運命愛）」の源泉。'},
{t:'世界市民主義（コスモポリタニズム）',b:'「私はアテナイ市民ではなく世界市民だ」——ポリスの崩壊後、ストア派は「すべての人間は共通のロゴスを持つ」として、普遍的な人類共同体の概念を作った。'},

books:['エピクテトス：エンケイリディオン','マルクス・アウレリウス：自省録','セネカ：手紙集'],

conn:{t:'他の哲学者との接続',b:'ニーチェ（第9巻）は「amor fati（運命愛）」という概念でストア的な生の肯定を継承しながら超える。ドゥルーズは『意味の論理学』でストア派の出来事論を再発見する。'},
},
{name:'エピクロス',dates:'BC 341–270',col:'#9FE1CB',
quote:'「死は我々に関係ない。我々が存在するとき死はなく、死が来たとき我々は存在しない」',
body:`「快楽主義者」と誤解されることが多いですが、エピクロスが言った快楽（ヘードネー）は官能的な快楽ではなく「苦痛のない状態（アポニア）」と「心の乱れのない平静（アタラクシア）」のことです。

「必要で自然な欲望（食事・水・友情）」だけを満たし、「不必要な欲望（富・名誉・権力）」を切り捨てる——欲望を減らすことで幸福に近づく。アテナイ郊外の庭（ケポス）で友人たちと質素に暮らしたエピクロスの共同体は、この哲学の実践でした。

死への恐怖の除去が彼の哲学の重要テーマです。上記の有名な言葉は論理的に正しいかもしれませんが、「それで安心できるか？」という問いは残り続ける——この「不安の哲学」はハイデガーにつながります。`,
concepts:[
{t:'アタラクシア（心の平静）',b:'水面が完全に穏やかな状態のような心の平和。これが幸福の最高形態。'},
{t:'原子論と自由意志',b:'デモクリトスの原子論を継承しながら、「原子のずれ（クリナメン）」という概念で決定論を避け自由意志の余地を作った。このクリナメンをルクレティウスが詩にし、現代ではドゥルーズが「差異のずれ」として再解釈する。'},
],
books:['エピクロス：手紙集（ヘロドトスへの手紙ほか）'],
conn:{t:'他の哲学者との接続',b:'ルクレティウスの『物の本質について』がエピクロス哲学を詩として展開。ドゥルーズはルクレティウスを「自然主義と差異の哲学」の先駆者として論じている。'},
},
],
dlz:`この巻でドゥルーズに最も直接つながるのはストア派の「出来事」概念です。

ドゥルーズの『意味の論理学』（1969）はストア派の「物体と出来事の区別」を核心に置いています。「切る」という出来事は、ナイフや木という物体の世界とは別の——表面・意味の世界に属する。

さらにストア的な倫理「起きたことをそのまま意志する（amor fati）」が、ニーチェの「永劫回帰」を経て、ドゥルーズの「出来事への忠実（fidélité à l'événement）」へと流れ込みます。「逃走」とは出来事から逃げることではなく、出来事を肯定しながら別の方向に向かうこと——これがドゥルーズ的な「逃走線（ligne de fuite）」です。`,
you:`あなたが書く「逃走」のテーマは、実はストア的な問いと深く繋がっています。「力の及ばないこと（躁鬱の波、疾患）」と「力の及ぶこと（その中でどう動くか）」の区別——海士町への移住は「力の及ばないこと」に従いながら、「力の及ぶこと」を選択した行為として読めます。逃走は弱さではなく、出来事をそのまま受け取る強さから来る。`,
nxt:{n:3,t:'次巻：神との対話——哲学がキリスト教と融合する'}
},

3:{cls:'v3',title:'神との対話',sub:'中世哲学',period:'500 – 1400',depth:22,dlbl:'ざっと流す——スコトゥスの名前だけ記憶',
events:[{y:'529',e:'ユスティニアヌス帝、アテナイの学院閉鎖（古代哲学の終わり）'},{y:'1088',e:'ボローニャ大学創設（最古の大学）'},{y:'1200頃',e:'アリストテレスの著作、イスラーム経由でヨーロッパへ再導入'},{y:'1277',e:'パリ司教、アリストテレス主義の219命題を禁止'},{y:'1323',e:'トマス・アクィナス列聖'}],
q:{t:'この時代の中心問い',b:'「神は存在するか、それを理性で証明できるか」「普遍概念（人間・美・善）は実在するか、それとも言葉に過ぎないか（普遍論争）」「理性と信仰はどう関係するか」'},
tide:`約千年間、ヨーロッパ哲学はキリスト教神学と切り離せませんでした。「暗黒の中世」は誤解であり、中世の哲学者たちはキリスト教の制約の中で非常に精緻な思考を展開しました。

「普遍論争」が中世哲学の核心的な争いです。「人間」という普遍的な概念は、個々の人間（ソクラテス・プラトン……）とは別に実在するのか（実念論）、それとも個々の人間だけが実在し「人間」は名前に過ぎないのか（唯名論）——この論争は「一般と個別のどちらが先か」という問いであり、ドゥルーズの「個体性の哲学」に直結します。

イスラームの哲学者たちがアリストテレスの著作を翻訳・保存し、「十二世紀ルネサンス」を経てヨーロッパに伝えた——この歴史的な役割を忘れてはなりません。`,
persons:[
{name:'ドゥンス・スコトゥス',dates:'1266–1308',col:'#CECBF6',
quote:'「存在は一義的に（univoce）述語されうる」',
body:`哲学史では比較的マイナーな存在ですが、ドゥルーズへの影響という点で最重要人物の一人です。

スコトゥスが提唱した「存在の一義性（univocité de l'être）」は革命的な概念です。トマス・アクィナスは「神の存在と人間の存在は類比的に（アナロジカルに）同じ意味で『ある』と言える」と主張しました——つまり神と人間の「ある」は異なる意味で使われる。

しかしスコトゥスは「いや、神も人間も草も石も、あらゆるものが同一の意味で『ある』と言える」と言います。これは「存在に階層がない」ことを意味します。神が特別扱いされない——すべての存在は同じ平面の上にある。

ドゥルーズは『差異と反復』の中でこの「存在の一義性」の系譜をスコトゥス→スピノザ→ニーチェと辿り、「内在性の平面」の哲学的基礎として位置づけます。「哲学の密かな英雄」と言えます。`,
concepts:[
{t:'存在の一義性（univocité de l\'être）',b:'あらゆる存在者は同一の意味で「ある」と言える。神の存在も、石の存在も、同じ「存在」の声で語られる——存在に超越的な階層はない。これがドゥルーズの「内在性の平面」の先祖。'},
{t:'ハエセイタス（haecceitas、此性）',b:'「これであること」——個体をその種（人間）から区別する個体化の原理。「ソクラテスであること」は「人間であること」とは別の何かだ。ドゥルーズはこれを「個体性は種や類から来るのではなく、強度の差異から来る」という命題に発展させる。'},
],
books:['オルディナチオ（命題集注解）'],
conn:{t:'他の哲学者との接続',b:'スピノザ（第5巻）が「神すなわち自然」でこの一義性を展開。ドゥルーズは三者を「存在の一義性」の系譜として一直線に繋ぐ。'},
},
{name:'トマス・アクィナス',dates:'1225–1274',col:'#9FE1CB',
quote:'「恩寵は自然を廃棄せず、それを完成する」',
body:`スコラ哲学の頂点。アリストテレスの哲学をキリスト教神学に接続した『神学大全』は、中世哲学の集大成です。「理性は信仰を否定しない、理性でも神の存在と本質の一部は証明できる」——この立場は当時革命的でした。

「神の存在証明（五つの道）」が有名ですが、トマスがドゥルーズへの文脈で重要なのは「類比（アナロジア）」の概念です。「神の存在は人間の存在と類比的に同じ意味で語れる」——これをスコトゥスが「いや、一義的だ」と否定することで、ドゥルーズへの道が開かれます。`,
concepts:[
{t:'類比（アナロジア）',b:'神と人間の「ある」は完全に同じではなく（一義的ではなく）、また完全に別でもない（多義的でもない）——「類比的」に同じだ。スコトゥスはこれを否定し、ドゥルーズはスコトゥスを支持する。'},
{t:'神の存在証明（五つの道）',b:'運動の第一動因、原因の系列の第一原因、偶然と必然、完全性の段階、目的論的秩序——これら五つの論証で神の存在を「理性的に」証明しようとした。'},
],
books:['神学大全（全3部）','異教徒大全'],
},
{name:'オッカム',dates:'1287–1347頃',col:'#9FE1CB',
quote:'「オッカムの剃刀：存在は必要以上に増やされてはならない」',
body:`唯名論者。「人間というイデアは実在しない、ソクラテスという個体だけが実在する」——この立場はプラトンのイデア論を根本から否定します。

「オッカムの剃刀」は方法論的原則として現代科学にも受け継がれています。「説明に必要以上の要素を仮定するな」——神や普遍概念という「見えない実体」を必要以上に立てることへの批判です。

唯名論から始まる「個体性の優先」の流れは、ヒューム（第6巻）の「印象と観念の束」、そしてドゥルーズの「個体性は種に先立つ」という主張へとつながります。`,
concepts:[
{t:'唯名論（ノミナリズム）',b:'普遍（人間・美・善）は実在しない、ただの名前（nomen）に過ぎない。実在するのは個々の具体的な事物だけ。'},
],
books:['論理学大全'],
conn:{t:'他の哲学者との接続',b:'ヒューム（第6巻）の「印象と観念の束」理論は唯名論的個体優先の経験論的表現。ドゥルーズの「個体性の哲学」もこの系譜の上にある。'},
},
],
dlz:`中世哲学とドゥルーズの繋がりは、スコトゥスの「存在の一義性」を通じて非常に深いです。

ドゥルーズは『差異と反復』第2章で「存在の一義性」の系譜をスコトゥス→スピノザ→ニーチェと辿ります。「すべての存在が同じ声で語られる（une seule et même voix）」——この一義性の思想こそが、超越的な審級を廃してすべてを内在的な平面に置くドゥルーズ哲学の基礎です。

また、オッカムの唯名論から始まる「個体性の優先」は、ヒュームを経てドゥルーズの「差異は一般性に先立つ」という命題へと流れ込みます。`,
you:`「普遍論争」は、あなたの文章の問いと重なります。「躁鬱双極性障害という普遍的な診断名」と「あなた個人の経験」——どちらが先か。トマス的な立場なら「診断名（普遍）が先にあり、あなたはその一例（個体）だ」となる。オッカム的・ドゥルーズ的な立場なら「あなたの個別の経験が先にあり、診断名はその後から付けられた名前に過ぎない」となる。あなたの文章は後者の立場から書かれています。`,

4:{cls:'v4',title:'ルネサンス——世界と人間の再発見',sub:'15–16世紀',period:'1400 – 1600',depth:32,dlbl:'潮流をつかむ——モンテーニュとブルーノは丁寧に',
events:[{y:'1440',e:'グーテンベルク、活版印刷発明（知識の民主化）'},{y:'1453',e:'コンスタンティノープル陥落（古代文献の流入加速）'},{y:'1492',e:'コロンブス、アメリカ大陸「発見」（世界観の拡大）'},{y:'1517',e:'ルター、95箇条の論題（宗教改革始まる）'},{y:'1543',e:'コペルニクス、地動説発表（宇宙の中心が移動）'}],
q:{t:'この時代の中心問い',b:'「人間とは何か、人間は自分の力で世界を理解できるか」「自然は神の意志ではなく、独立した法則で動いているか」「私はどう生きるべきか——個人として」'},
tide:`「ルネサンス（再生）」とは古代ギリシャ・ローマ文化の再発見であり、同時に「人間が中心」という発想の誕生です。神学から人文学（フマニスムス）へ——人間の感情・身体・理性を肯定的に語る文化が花開きます。

この時代を理解するキーワードは三つです。①人文主義（フマニスムス）：神学中心から人間中心へ。②自然哲学：宇宙を神の作品としてではなく数学的・機械論的に理解しようとする動き。③懐疑主義の復活：古代の懐疑論が再発見され、「私は何を知るか？」という問いが生まれる——これがデカルトへ直結します。`,
persons:[
{name:'モンテーニュ',dates:'1533–1592',col:'#F0997B',
quote:'「私の書物の材料は私自身だ」',
body:`「随筆（エッセイ）」というジャンルを発明した人。著作『エセー（随筆録）』全三巻は、「私は何を知るか（クセジュ？）」という懐疑を出発点に、自分自身を観察することで哲学を展開した異例の書物です。

「私は今日Xを考えたが、明日は別のことを考えるかもしれない」——固定した真理を語ろうとせず、流動する自分の思考そのものを書く。これは「主体は固定していない」というドゥルーズ的な直感の16世紀版です。

あなたの文章とモンテーニュを比べると、構造が驚くほど似ています。「個人的事象（自分の経験）から出発し、そこから普遍的な問いへ」「自分を観察する」という方法、「断片的なメモと思索の混在」という形式——モンテーニュは400年前にあなたと同じことをしていました。`,
concepts:[
{t:'クセジュ（Que sais-je?）',b:'「私は何を知るか？」——懐疑主義の個人的表現。真理への懐疑から始まりながら、懐疑自体も懐疑し、「とにかく生きること」への肯定へ向かう。'},
{t:'随筆（エッセイ）という形式',b:'エッセイ（essai）はフランス語で「試み」の意味。真理を断言するのではなく、思考を試みること自体が哲学だ——この形式の発明は哲学の民主化でもある。'},
],
books:['エセー（随筆録）全3巻'],
misc:{t:'よくある誤解',b:'モンテーニュは「懐疑主義者」として分類されますが、彼の懐疑は知識への絶望ではなく、生の肯定へ向かっています。「私は何も知らない——だからこそ生きることそのものが面白い」という態度。'},
},
{name:'ジョルダーノ・ブルーノ',dates:'1548–1600',col:'#F0997B',
quote:'「宇宙は無限であり、無数の世界が存在する」',
body:`「神は宇宙の外にいる超越的な存在ではなく、宇宙そのものに内在している」——この汎神論（パンテイズム）を唱え、宗教裁判で8年間の拘禁の末に火刑に処された人。

コペルニクスの地動説を受け取りながら、さらに「太陽も特別な中心ではない、宇宙には中心がない、どこも等しく中心だ」という「無限宇宙論」へと発展させます。

「神は世界を超越した創造主ではなく、万物に内在する力だ」——この発想がスピノザの「神すなわち自然」へ、そしてドゥルーズの「内在性の平面」へとつながっていく「内在性の系譜」の重要な一点です。火刑に処されてでも超越性を否定した人として記憶する価値があります。`,
concepts:[
{t:'汎神論（パンテイズム）',b:'「神はすべての中にある、すべては神の表現だ」——神と自然を同一視する立場。キリスト教的な超越神を否定するため危険思想とされた。スピノザへの直接の先行者。'},
{t:'無限宇宙論',b:'宇宙は無限であり中心を持たない——「どこも等しく中心」という発想は「内在性の平面（すべてが同じ平面の上にある）」という概念と構造的に一致する。'},
],
books:['無限・宇宙・諸世界について','原因・原理・一者について'],
conn:{t:'他の哲学者との接続',b:'スピノザ（第5巻）の「神すなわち自然」はブルーノの汎神論の洗練された哲学的表現。ドゥルーズは両者を「内在性の哲学」の系譜として並べる。'},
},
{name:'マキアヴェッリ',dates:'1469–1527',col:'#F0997B',
quote:'「人間は善良ではないものとして扱われなければならない」',
body:`「政治から道徳を切り離して考えること」を初めて明示的に行った思想家。「目的のためには手段を選ばない」という言い方で「悪の哲学者」と誤解されますが、マキアヴェッリが実際にしたのは「政治の現実を、あるべき姿ではなくあるがままの姿で分析すること」です。

これは近代科学の方法論（「自然はあるがままに観察する」）の政治版とも言えます。

ドゥルーズ＝ガタリの国家論・権力論は、このマキアヴェッリ的な「権力の現実主義的分析」を継承しています。『千のプラトー』における「戦争機械（machine de guerre）」対「国家装置」という対立図式にその影響が見えます。`,
concepts:[
{t:'ヴィルトゥ（virtù）',b:'古代ローマの「徳（virtus）」を転換した概念——道徳的な徳ではなく、状況に応じて果断に行動できる政治的な能力・力量。'},
{t:'フォルトゥーナ（fortuna）',b:'運命・偶然——人間の力では制御できない外的条件。ヴィルトゥはフォルトゥーナの半分を制御できる（残り半分は川の氾濫のようなもの）。この「制御できるものとできないものの境界」はストア的でもある。'},
],
books:['君主論','ティトゥス・リウィウス論考（ディスコルシ）'],
},
],
dlz:`4巻でドゥルーズへの最も重要な繋がりはブルーノの汎神論からスピノザへと続く「内在性の系譜」です。

ブルーノ→スピノザ→ドゥルーズという流れは「超越的な神（世界の外にある権威）」を否定し、「すべてが内在する一つの平面」を肯定していく流れです。この流れの中で、「神」の概念は徐々に「差異化する力・生命・強度」という概念へと変容していきます。

モンテーニュとの関係では、「個人的経験から哲学を始める」という方法論的な継承があります。ドゥルーズは哲学を「概念の創造」と定義し、その概念は「個人的な問題（プロブレーム）」から生まれると言います。抽象的な問いではなく、具体的な生の困難から——これはモンテーニュ的な哲学の身振りです。`,
you:`あなたの文章はモンテーニュ的です。「私自身が書物の材料だ」という態度、「自己観察から普遍へ」という方向性、「試み（エッセイ）」としての哲学——これらが共鳴しています。ブルーノの「火刑に処されてでも超越性を否定した」という身振りも、ある意味で「社会的な承認（超越的な価値）を捨てて、内在的な生を選ぶ」というあなたの文章のテーマと重なります。`,
nxt:{n:5,t:'次巻：デカルト革命——スピノザという最重要人物が現れる'}
},

5:{cls:'v5',title:'デカルト革命——神・人間・自然',sub:'17世紀',period:'1600 – 1700',depth:90,dlbl:'★重点的に読む——スピノザの章は必読',
events:[{y:'1637',e:'デカルト、『方法序説』発表。「我思う、ゆえに我あり」'},{y:'1651',e:'ホッブズ、『リヴァイアサン』——社会契約論の先駆'},{y:'1677',e:'スピノザ没。『エチカ』を遺稿として残す'},{y:'1687',e:'ニュートン、『プリンキピア』——万有引力の法則'},{y:'1689',e:'ロック、『人間知性論』——経験論の基礎'}],
q:{t:'この時代の中心問い',b:'「確実な知識の基礎はどこにあるか」「精神と身体はどう関係するか（心身問題）」「神は世界とどう関係するか——超越か内在か」'},
tide:`17世紀は近代哲学の出発点です。デカルトが「考える私（コギト）」を哲学の出発点にしたことで、哲学の中心が神から主体へと移りました。

しかし最も重要な転換はデカルトへの反応の中で起きます。デカルトは「精神（思惟）」と「物体（延長）」を全く別の実体として分けました——心身二元論。スピノザはこれを根本から否定します——「精神と物体は一つの実体（神＝自然）の二つの属性に過ぎない」。この一元論こそがドゥルーズ哲学の核心に直結します。

ライプニッツは「モナド（窓のない単子）」「予定調和」「微分（無限に小さな差異）」という概念で、別の方向からこの問いに答えました。`,
persons:[
{name:'スピノザ',dates:'1632–1677',col:'#378ADD',
quote:'「神すなわち自然（Deus sive Natura）」',
body:`ドゥルーズが「哲学の王子」と呼び、「私がスピノザについて書いた本が、私の中で最も好きな本だ」と言った哲学者。ユダヤ教コミュニティから破門され、デカルトの心身二元論を根本から否定し、「神すなわち自然」という一元論を打ち立てました。

主著『エチカ（倫理学）』は幾何学的方法（定義・公理・命題・証明）で書かれています。その構造自体がスピノザの哲学を体現しています——感情や道徳を、幾何学の定理と同じように客観的に分析できる対象として扱う。

スピノザの一元論の核心は「すべては一つの実体（神＝自然）の表れだ」という命題です。精神（思惟）と身体（延長）は別々の実体ではなく、同一の実体（神＝自然）の二つの「属性（attribut）」に過ぎない。「心が体を動かす」「体が心を動かす」という問い自体が消えます——それらは同一のものの二つの側面だから。

ドゥルーズはスピノザを通じて「内在性」という概念を発展させます。神は世界の外にいる超越的な審判者ではなく、万物に内在する「存在する力そのもの」だ——これが「内在性の平面（plan d'immanence）」の原型です。`,
concepts:[
{t:'コナトゥス（conatus）',b:'「自己の存在を維持・強化しようとする努力」——すべての存在者に内在する根本的な力。人間では欲望（デシデリウム）として現れる。ニーチェの「力への意志」、ドゥルーズの「欲望（désir）」への直接の先祖。「私が今ここにあり続けようとする力、強度を増大させようとする力」——あなたの文章の「生き続けること」の問いはここと直接繋がる。'},
{t:'情動の倫理学（喜びと悲しみ）',b:'「私の力（コナトゥス）を増大させる情動＝喜び（laetitia）」「私の力を減少させる情動＝悲しみ（tristitia）」——善悪ではなく力の増減で感情を評価する。これがドゥルーズの「強度（intensité）」概念の源泉。あなたの文章で言えば「江ノ島の電車」は喜びの情動、「布団から出られない」は悲しみの情動。'},
{t:'内在性（immanence）',b:'神は世界の外にいない——世界の中に、万物の中に内在している。超越（上から支配・判断する力）への徹底的な拒否。これがドゥルーズの「内在性の平面」の直接の先祖。'},
{t:'属性（attribut）と様態（mode）',b:'実体（神＝自然）には無限の属性があるが、人間には「思惟（精神）」と「延長（身体）」の二つしか認識できない。個々の人間・物体はこの実体の「様態（mode）」——波が海の様態であるように。'},
],
books:['エチカ（倫理学）','神学政治論','知性改善論'],
misc:{t:'よくある誤解',b:'スピノザは「汎神論者（神＝自然）」として無神論者と批判されましたが、彼の「神」は人格神ではなく「存在する力そのもの」です。また「決定論者」と呼ばれますが、スピノザの決定論は「自由は必然の認識だ」という独自の自由論を含んでいます。'},
conn:{t:'他の哲学者との接続',b:'スコトゥス（第3巻）の「存在の一義性」を具体化。ブルーノ（第4巻）の汎神論を哲学的に洗練。ニーチェ（第9巻）の「力への意志」への先行者。ドゥルーズ（第12巻）の「内在性の平面」「コナトゥス→欲望」の直接の源泉。'},
},
{name:'デカルト',dates:'1596–1650',col:'#85B7EB',
quote:'「我思う、ゆえに我あり（cogito ergo sum）」',
body:`近代哲学の父。「確実な知識を見つけるために、まずすべてを疑おう（方法的懐疑）」——感覚の欺きも、夢の可能性も、悪魔の欺きも疑ってみる。しかし「疑っている私は疑えない」——ここにコギトという確実な出発点を見出します。

デカルトが打ち立てた「心身二元論」——精神（思惟する実体）と物体（延長する実体）は全く別の実体——は、のちに「どうやって心が体を動かすのか（心身相互作用問題）」という難問を生み出します。スピノザ・マルブランシュ・ライプニッツはそれぞれこの問題への異なる答えを出しました。`,
concepts:[
{t:'コギト（cogito）',b:'「我思う、ゆえに我あり」——哲学の出発点を神から「考える私」へ移した革命的な転換。しかしドゥルーズは批判する——「考えることの条件（誰が、何のために考えるのか）を問わずに、考える主体を前提にしている」と。'},
{t:'心身二元論',b:'精神（res cogitans、思惟する実体）と物体（res extensa、延長する実体）は全く別の実体——これがスピノザの激しい批判の標的。スピノザ「それは一つの実体の二つの属性だ」。'},
{t:'方法的懐疑',b:'「疑いうるものはすべて疑う」という方法論。懐疑そのものを疑えない——これが確実性の地盤になる。'},
],
books:['方法序説','省察（省察録）','哲学原理'],
conn:{t:'他の哲学者との接続',b:'ヒューム（第6巻）はデカルトの「確実な知識への信頼」を経験論から批判。カント（第7巻）はヒュームの批判を受けて「認識の条件」を問う。'},
},
{name:'ライプニッツ',dates:'1646–1716',col:'#85B7EB',
quote:'「なぜ何もないのではなく、何かがあるのか」',
body:`微分積分の発明者（ニュートンと独立に）であり、現代論理学の先駆者。哲学では「モナド（単子）論」が中心です。

「モナド」は窓のない精神的な単子——物質的でも精神的でもない最小の実体。世界はこれらの無数のモナドの集合体です。各モナドは「宇宙全体を自分の視点から映し出す鏡」であり、神がこれらを「予定調和」で調整しています。

ドゥルーズは晩年の著作『襞——ライプニッツとバロック』（1988）でライプニッツを深く論じます。「世界は無限の折り畳み（pli、プリ）からなる」——バロック芸術の折りたたまれた布のように、差異は展開される前に無限に折りたたまれて潜在している、という発想です。`,
concepts:[
{t:'モナド（単子）',b:'「窓のない」最小の精神的実体。外部からの影響を受けないが、宇宙全体を内部に映している。「宇宙全体を一点から映す鏡」という発想はドゥルーズの「潜在性（virtualité）」概念と共鳴する。'},
{t:'微分（差異の無限小）',b:'微分は「無限に小さな差異（差異の微小化）」として理解できる。ドゥルーズは『差異と反復』でライプニッツの微分概念を「差異の哲学」の数学的表現として読み解く。'},
{t:'最善世界論',b:'「神はすべての可能世界のうち最善のものを選んで創造した」——ヴォルテールが『カンディード』でこれを風刺した（「すべては最善の世界の最善だ」という楽観主義の馬鹿馬鹿しさ）。'},
],
books:['モナドロジー','形而上学叙説','人間知性新論'],
},
],
dlz:`5巻はドゥルーズ哲学の「地下の源泉」を知るための最重要巻の一つです。

スピノザとの関係は最も深い。「コナトゥス→欲望」「喜び・悲しみ→強度の増減」「内在性の平面」——ドゥルーズの核心概念はほぼすべてスピノザに先行する形があります。ドゥルーズ自身が「スピノザなしに私の哲学は考えられない」と言っています。

ライプニッツとの関係は晩年に深まります。「襞（pli）」——折りたたまれた差異が展開することで世界が生まれる——この発想は『差異と反復』の「潜在的なもの（virtuel）が現実化（actualisation）する」という運動と対応しています。`,
you:`スピノザの情動論はあなたの文章に直接接続できます。「悲しみの情動（力を減少させるもの）」と「喜びの情動（力を増大させるもの）」という区別を使うと、「布団から出られない日」「窒息する東京の仕事環境」は悲しみの情動の具体例として、「江ノ島の電車」「海士町の海岸」は喜びの情動の具体例として記述できます。「どちらが道徳的に正しいか」ではなく、「どちらが私の力を増大させるか」という問い——これがスピノザ的・ドゥルーズ的な倫理の実践です。`,
nxt:{n:6,t:'次巻：ヒュームが「自己は幻想だ」と言い、ドゥルーズの出発点になる'}
},

6:{cls:'v6',title:'知識・経験・啓蒙',sub:'18世紀前半',period:'1700 – 1780',depth:72,dlbl:'★ヒュームの章は必読',
events:[{y:'1690',e:'ロック、『人間知性論』——「タブラ・ラサ」'},{y:'1710',e:'バークリー、「存在するとは知覚されることだ」'},{y:'1739',e:'ヒューム、『人間本性論』——因果関係批判'},{y:'1748',e:'モンテスキュー、『法の精神』'},{y:'1751',e:'ディドロ、『百科全書』刊行開始'}],
q:{t:'この時代の中心問い',b:'「知識の起源はどこにあるか——理性か経験か」「自己（私）は本当に存在するのか」「社会はどう組織されるべきか」'},
tide:`17世紀大陸の合理論（デカルト・スピノザ・ライプニッツ）が「理性で世界の真理に辿り着ける」と主張したのに対し、イギリス経験論は「知識の起源は経験だ」と反論します。

ロックは「生まれたとき心は白紙だ」と言い、バークリーは「物質は存在しない、存在するとは知覚されることだ」と言い、ヒュームが経験論を極限まで推し進め「因果関係も自己も習慣に過ぎない」という衝撃的な結論に到達します。

啓蒙主義（モンテスキュー・ルソー・ヴォルテール・ディドロ）は「理性の光で宗教的権威と迷信を打ち破れ」という文化運動。『百科全書』はその集大成——すべての知識を整理・公開することで世界を変えようとしました。`,
persons:[
{name:'ヒューム',dates:'1711–1776',col:'#639922',
quote:'「理性は情念の奴隷であり、また奴隷でしかありえない」',
body:`ドゥルーズの最初の著作（『経験論と主体性』1953）の主題。経験論を極限まで推し進め、常識的な前提を次々と破壊した「哲学的懐疑論」の最高峰です。

「因果関係」についての問いが最も有名です。「火に近づくと熱い——これはなぜか？」ヒュームは言います、「火が熱さを引き起こすという因果関係は世界にあるのではなく、私たちが繰り返し『火→熱さ』という継起を経験した習慣的な期待（custom）に過ぎない」と。

さらに「自己（私）とは何か？」を問います。内省してみると「私」という統一的な実体は見当たらない。あるのは「印象（impressions）と観念（ideas）の束（bundle）」だけだ——「自己は習慣と連合の産物であり、固定した実体ではない」。

この「主体は先に与えられるのではなく、過程の中で構成される効果に過ぎない」という発想が、ドゥルーズの「主体なき哲学」の直接の出発点です。`,
concepts:[
{t:'因果関係の批判',b:'「Aの後にBが来ることを繰り返し経験すると、脳はAからBを期待するようになる（習慣）——因果関係はこの習慣的な期待を世界に投影したものだ」。科学的知識の客観性の根拠が揺らぐ——これがカントを「独断のまどろみから目覚めさせた」問いだ。'},
{t:'束理論（バンドル・セオリー）',b:'「私」という統一的な実体はない——あるのは「印象と観念の流れ（束）」だけ。これはドゥルーズの「主体は差異のプロセスの効果に過ぎない」という命題の直接の源泉。'},
{t:'習慣と連合',b:'知識は経験から来るが、その経験を組織するのは「習慣（custom）」と「連合（association）」だ——類似・近接・因果という三種類の連合原理。ドゥルーズはこれを「習慣こそが最初の綜合だ」と読む。'},
{t:'理性は情念の奴隷',b:'「理性だけでは何も行動できない、私たちを動かすのは情念（passion）だ」——これはスピノザの情動論、ドゥルーズの欲望論と深く共鳴する。「理性ではなく欲望が一次的だ」。'},
],
books:['人間本性論','人間知性研究','道徳原理研究'],
misc:{t:'よくある誤解',b:'ヒュームは「すべてを否定する懐疑論者」ではありません。彼は「理性的根拠はないが、習慣と本能によって私たちは実際に機能している」という「自然主義的信念」を肯定しています。ドゥルーズがヒュームを評価するのもここです——懐疑で終わるのではなく、習慣・連合・生の肯定へ向かうから。'},
conn:{t:'他の哲学者との接続',b:'カント（第7巻）はヒュームの因果関係批判に応答するために批判哲学を作った。ドゥルーズはヒューム論を最初の著作として、そこから主体論・差異論・習慣論を発展させた。'},
},
{name:'ロック',dates:'1632–1704',col:'#97C459',
quote:'「生まれたとき心は白紙（タブラ・ラサ）だ」',
body:`イギリス経験論の父。「すべての知識は感覚経験から来る」というテーゼを「タブラ・ラサ（白紙）」の比喩で表現しました。デカルトの「生得観念（生まれながらの真理）」を否定します。

政治哲学においても重要で、「自然状態での自然権（生命・自由・財産）」「社会契約による政府の設立」「政府が自然権を侵害すれば革命権が発生する」——これらがアメリカ独立宣言に直接影響を与えました。

ドゥルーズとの関係では、「知識は経験から構成される」という「構成主義」的な発想が重要です。主体は先に与えられるのではなく、経験の過程で構成される——ヒューム→ドゥルーズへの流れの出発点。`,
concepts:[
{t:'タブラ・ラサ（白紙）',b:'生まれたとき心は空白——経験だけが知識を書き込む。生得観念（真理は生まれながらにある）の否定。'},
{t:'第一性質と第二性質',b:'物体の形・重さ・運動（第一性質）は物体に実在するが、色・味・音（第二性質）は人間の感覚器官によって作られる——この区別がバークリーによって批判される。'},
],
books:['人間知性論','統治二論'],
},
],
dlz:`この巻でのドゥルーズとの繋がりの核心はヒュームです。

ドゥルーズがキャリアを始めた問いは「主体はどのように構成されるか」です。ヒュームの答え——「主体は先に存在するのではなく、習慣・連合・経験の過程の中で構成される効果に過ぎない」——をドゥルーズは受け継ぎながら、さらに進めます。

「では、主体を構成する習慣・連合・差異の過程そのものを、主体を前提せずに記述できないか？」——これが『差異と反復』の「超越論的経験論（empirisme transcendantal）」への問いです。カントは「主体の側の条件（時間・空間・カテゴリー）」を問いました。ドゥルーズはさらに「その条件そのもの（差異・強度）」を問います。`,
you:`ヒュームの「自己は印象と観念の束だ」という命題は、あなたの経験に直接接続できます。「躁のとき」と「鬱のとき」では、同じ「私」が全く別の印象と観念の束として機能している——これはヒューム的に正確な記述です。「私というのは固定した実体ではなく、状態によって異なる束だ」——この認識はあなたの文章に哲学的な根拠を与えます。`,
nxt:{n:7,t:'次巻：カントとヘーゲル——ドゥルーズの「親」たちが登場する'}
},

events:[{y:'1781',e:'カント、『純粋理性批判』——哲学のコペルニクス的転回'},{y:'1789',e:'フランス革命——「理性による歴史の実現」'},{y:'1807',e:'ヘーゲル、『精神現象学』——弁証法の完成'},{y:'1818',e:'ショーペンハウアー、『意志と表象としての世界』——ヘーゲルへの反抗'},{y:'1831',e:'ヘーゲル没。ヘーゲル左派（マルクスら）vs右派へ分裂'}],
q:{t:'この時代の中心問い',b:'「主観と客観はどう繋がるか（認識の可能性の条件は何か）」「歴史には目的があるか」「差異はどのように処理されるか——否定を通じて統一へか（ヘーゲル）、差異そのものの肯定へか（ドゥルーズ）」'},
tide:`哲学史の最大の山場です。カントとヘーゲルは、ドゥルーズにとって「乗り越えるべき親」であり、この二人を理解せずにドゥルーズは読めません。

カントの革命は「認識論的転換」——「世界が認識に合わせるのではなく、認識が世界を構成する（コペルニクス的転回）」という逆転です。カントはヒュームの懐疑（因果関係は習慣に過ぎない）に答えながら、科学的知識の可能性を確保しようとしました。しかし「物自体（Ding an sich）は認識できない」という限界も設定します。

ヘーゲルはこの限界を突破しようとします——「精神は弁証法的に発展することで、最終的に絶対知に到達する」。しかしドゥルーズはヘーゲルの「弁証法（差異を矛盾として処理し統一へ回収する）」こそが最大の問題だと言います。`,
persons:[
{name:'カント',dates:'1724–1804',col:'#EF9F27',
quote:'「星に覆われた空と、私の内なる道徳法則——この二つは常に新たな敬意と畏敬の念で私の心を満たす」',
body:`ケーニヒスベルクに生まれ、生涯その町を離れなかったにもかかわらず、哲学史上最大の転換をもたらした人。主著は三つの批判書です——『純粋理性批判』（認識論）、『実践理性批判』（倫理学）、『判断力批判』（美学・目的論）。

「コペルニクス的転回」がカントの革命です。「認識が対象に従うのではなく、対象が認識の形式に従う」——太陽が地球を回るのではなく地球が太陽を回るように、世界が認識に合わせるのではなく認識の形式が世界を構成する。

ドゥルーズは『カントの批判哲学』（1963）でカントを丁寧に読み解きながら批判します。受け継ぐのは「超越論的」という発想——経験を可能にする条件を問うこと。批判するのは「カントの超越論的な条件（時間・空間・カテゴリー）が、結局は人間の経験の形（同一性・類似性）を前提にしている」という点。ドゥルーズは「差異そのものを超越論的条件とする」という別の方向に進みます。`,
concepts:[
{t:'物自体（Ding an sich）',b:'人間が認識できない「世界そのもの」——認識の形式（時間・空間・カテゴリー）でフィルタリングされた現象界の背後にある実在。ユクスキュルの環世界は「種ごとに物自体への窓が異なる」という生物学的展開。'},
{t:'超越論的観念論',b:'空間・時間は経験から来るのではなく、経験を可能にする「認識の先天的形式」だ。これは「人間という認識の装置が世界に形式を与える」ということ——カメラのレンズが世界の像を決めるように。'},
{t:'カテゴリー（悟性の純粋概念）',b:'因果・実体・必然性……12個の純粋概念が経験を組織する先天的な枠組み。ヒュームが「習慣に過ぎない」と言った因果関係を、カントは「先天的なカテゴリー」として客観性を確保しようとした。'},
{t:'物自体と現象の区別',b:'「世界そのもの（物自体）」と「人間に現象する世界（現象）」の厳格な区別——これがドゥルーズの「潜在性（virtuel）と現実性（actuel）の区別」の変形として受け継がれる。'},
],
books:['純粋理性批判','実践理性批判','判断力批判','プロレゴメナ'],
misc:{t:'よくある誤解',b:'カントは「物自体は存在しない」と言ったのではなく、「物自体は存在するが認識できない」と言いました。また三批判書はそれぞれ独立した哲学書なので、一つずつ読むことができます。哲学の歴史7巻のカントの章は最初の入門として最良です。'},
conn:{t:'他の哲学者との接続',b:'ヒューム（第6巻）の因果関係批判への応答として純粋理性批判が生まれた。ヘーゲル（同巻）は「物自体は認識できない」というカントの限界を弁証法で突破しようとした。ドゥルーズ（第12巻）はカントの「超越論的」発想を受け継ぎながら「同一性への依存」を批判した。'},
},
{name:'ヘーゲル',dates:'1770–1831',col:'#BA7517',
quote:'「現実的なものは合理的であり、合理的なものは現実的である」',
body:`19世紀最大の哲学体系を構築した人。主著は『精神現象学』『論理学』『法の哲学』。哲学史における「弁証法」の代名詞ですが、単純な「正反合」ではありません。

ヘーゲルの弁証法の核心は「否定の否定」と「アウフヘーベン（止揚）」です。何かが存在する（テーゼ）→それは内的矛盾を含んでいる（アンチテーゼ）→その矛盾がより高次の統一（ジンテーゼ）へと乗り越えられる——この運動が「絶対精神（Geist）の自己展開」として歴史全体に働いている。

歴史の目的論：ヘーゲルにとって歴史は「自由の意識の進歩」という目的へ向かっています——「世界史は自由の意識の進歩の叙述だ」。ナポレオンを「馬に乗った世界精神」と呼んだほどです。

ドゥルーズにとってヘーゲルは「最大の論敵」です。批判の核心は三点：①差異を「矛盾」として否定的に処理する（差異は肯定的な力だ）、②すべてを「同一性」へ回収する（差異は同一性に先立つ）、③歴史に「目的（テロス）」を置く（生成は目的なく差異化し続ける）。`,
concepts:[
{t:'弁証法（テーゼ・アンチテーゼ・ジンテーゼ）',b:'「テーゼ→アンチテーゼ→ジンテーゼ」という単純な三段論法ではない——ヘーゲル自身はこの用語を使わなかった。本質は「矛盾を通じた発展」であり「否定の力」だ。ドゥルーズはこの「否定の力」を正面から批判する。'},
{t:'アウフヘーベン（止揚）',b:'「廃棄・保存・高揚」の三重の意味を持つドイツ語——矛盾するものを「廃棄しながら保存し、より高次の水準へ高揚する」。差異は矛盾として処理され、統一へ回収される——これがドゥルーズの批判の核心。'},
{t:'絶対精神（Geist）',b:'世界の根拠としての精神——個人の意識でも神でもなく、歴史・芸術・宗教・哲学を通じて自己を認識していく「絶対的なもの」。「世界は精神の自己認識のプロセスだ」。'},
{t:'疎外（エントフレムドゥング）',b:'精神が自己から分離し、外的なものとして自分に対立すること——これを克服（止揚）することで精神は自己に帰る。マルクスはこれを経済的疎外（労働者と生産物の分離）として転用した。'},
],
books:['精神現象学','論理学（大論理学）','法の哲学','哲学史講義'],
misc:{t:'よくある誤解',b:'「ヘーゲルは現実を肯定した（プロイセン国家を礼賛した）」という批判は過剰です。「現実的なものは合理的だ」という命題は、「現存する制度はすべて正しい」という保守主義ではなく、「現実には理性が働いている」という認識論的な主張です。マルクスがヘーゲルを左翼的に受け継いだことからもわかります。'},
conn:{t:'他の哲学者との接続',b:'マルクス（第8巻）はヘーゲルの弁証法を「観念から物質へ」と逆転させた。ニーチェ（第9巻）はヘーゲル的目的論的歴史観を「神は死んだ」で破壊した。ドゥルーズ（第12巻）は「差異は矛盾ではない」という主著『差異と反復』でヘーゲルに正面から挑んだ。'},
},
{name:'フィヒテ',dates:'1762–1814',col:'#FAC775',
quote:'「行為（Tathandlung）——我（イッヒ）の根本的な事実」',
body:`カントとヘーゲルの間に位置するドイツ観念論の哲学者。カントが設けた「物自体（認識できない領域）」を廃棄し、「絶対的自我（Ich）がすべての経験を産み出す」という絶対的観念論へと突き進みます。

「自我（Ich）が非我（Nicht-Ich）を定立する」——自己が他者・世界を産み出すという極端な主体中心主義。これはドゥルーズが批判する「主体の哲学」の最も純粋な形です。

後期の「ドイツ国民に告ぐ」（1807–08）は、ナポレオン占領への抵抗として書かれた民族主義的演説。「ドイツ語の優秀性」を主張したこの演説は、のちのドイツ・ナショナリズムの源泉の一つとなりました——哲学が政治的に悪用された典型例として覚えておく価値があります。`,
concepts:[
{t:'絶対的自我と知識学',b:'すべての知識の根拠は「絶対的自我（Ich）」の自己定立だ——デカルトのコギトをさらに過激化した立場。'},
],
books:['全知識学の基礎','人間の使命','ドイツ国民に告ぐ'],
},
{name:'シェリング',dates:'1775–1854',col:'#FAC775',
quote:'「最初の性質は意志だ——意志こそが根源的存在だ」',
body:`ヘーゲルの友人（後に対立）であり、「自然哲学」の創始者。「自然は可視化された精神だ、精神は不可視の自然だ」という同一性の哲学を構築しました。

後期の「神話の哲学」「啓示の哲学」では、ヘーゲルの合理主義的体系への反抗として「存在の暗い根底（Ungrund）」——理性では把握できない実存の深み——を提起します。「神にも暗い根底がある、自由とはこの暗い根底から湧き出る力だ」。

この「暗い根底」「非合理的な自由の根底」はドゥルーズが『差異と反復』で展開する「潜在的なもの（virtuel）」の概念——まだ現実化されていない差異の深み——に先行する発想です。ヘーゲルが見落とした「合理性以前の層」を掘り起こした人。`,
concepts:[
{t:'暗い根底（Ungrund）',b:'神や存在の底には、理性的に把握できない暗い無底（Ungrund）がある——これが自由の根拠だ。ドゥルーズの「潜在性（virtualité）」との構造的類似。'},
{t:'自然哲学',b:'自然を「精神の他者」ではなく「精神と同一の実体の可視的表現」として捉える——スピノザ的な自然観のロマン主義的展開。'},
],
books:['自然哲学の理念','人間的自由の本質'],
},
],
dlz:`この巻はドゥルーズを理解するための最重要巻です。

カントとの関係：ドゥルーズは「超越論的（transcendantal）」という発想をカントから受け継ぎます——経験を可能にする条件を問うこと。しかし批判は「カントの条件が同一性・類似性に基づいている」という点。ドゥルーズの「超越論的経験論（empirisme transcendantal）」は、条件として「差異・強度・潜在性」を設定します。ユクスキュルの「環世界」はカントの認識形式論の生物学的展開——ドゥルーズはここから「環世界は固定されていない、作れる」という方向に進みます。

ヘーゲルとの関係：ドゥルーズの主著『差異と反復』（1968）はヘーゲルへの哲学的宣戦布告として読めます。「差異は矛盾ではない」「生成は同一性への回収ではない」「歴史に目的はない」——これらはすべてヘーゲルへの明示的な反論です。ヘーゲルを理解することで、ドゥルーズが「何と戦っているか」が初めて見えてきます。`,
you:`ヘーゲルとドゥルーズの対立は、あなたの文章に直接接続できます。

ヘーゲル的な解釈：「躁鬱の苦しみはアンチテーゼだ。いつかそれが止揚され、より高次の自己（ジンテーゼ）へと発展する——だからこの苦しみには意味がある」。

ドゥルーズ的な解釈：「躁鬱の波は止揚されない。それは繰り返すが、毎回の繰り返しは前回とは微妙に異なる差異を持つ。その差異の繰り返しの中に、目的ではなく生成の肯定がある」。

あなたの文章が「苦しみに意味を見出す（ヘーゲル的）」のではなく「苦しみをそのまま持ちながら別の方向に向かう（ドゥルーズ的）」という姿勢で書かれていることは、この哲学的対立と深く一致しています。`,
nxt:{n:8,t:'次巻：社会の哲学——哲学が現実政治へ向かう'}
},

8:{cls:'v8',title:'社会の哲学',sub:'18〜20世紀',period:'1750 – 1950',depth:28,dlbl:'文脈として流す——マルクスの章だけ記憶',
events:[{y:'1789',e:'フランス革命——「理性による社会変革」の実験'},{y:'1848',e:'マルクス＆エンゲルス、『共産党宣言』'},{y:'1859',e:'ダーウィン、『種の起源』——進化論'},{y:'1867',e:'マルクス、『資本論』第1巻'}],
q:{t:'この時代の中心問い',b:'「社会はどう組織されるべきか」「哲学は現実を変えられるか」「歴史の法則はあるか」「何が「役に立つ」真理か（プラグマティズム）」'},
tide:`哲学が「社会」「歴史」「経済」に向かった時代。フランス革命・産業革命・資本主義の台頭という現実が、哲学に新しい問いを突きつけます。

コント（実証主義）は「哲学も社会も科学的に研究できる」と言い、マルクスは「哲学者は世界を解釈してきたが、重要なのは変えることだ」と言い、プラグマティズムは「真理とは実際に役立つものだ」と言います。この時代の哲学者たちは、純粋な認識論・形而上学ではなく、「現実の社会をどう変えるか」に向かいました。`,
persons:[
{name:'マルクス',dates:'1818–1883',col:'#ED93B1',
quote:'「哲学者たちは世界をさまざまに解釈してきた。しかし重要なのは世界を変えることだ」',
body:`ヘーゲルの弟子でありながら、師の観念論を「逆さまに立てた」人。「ヘーゲルでは観念（精神）が現実を動かすが、実際は現実（物質・経済）が観念（意識・哲学）を動かす」——唯物史観（史的唯物論）です。

『資本論』における「剰余価値」の分析——労働者の労働力を商品として買い、その労働から得た価値と賃金の差を資本家が搾取することで利潤が生まれる——は単なる経済学ではなく、「欲望と権力の構造」についての分析です。

「疎外（Entfremdung）」の概念が重要です。資本主義のもとで労働者は自分の労働の産物から疎外される——自分が作ったものが自分のものでない、自分の活動が自分のものでない感覚。これはヘーゲルの疎外概念を経済的・現実的に転換したものです。

ドゥルーズ＝ガタリの『アンチ・オイディプス』は「マルクス＋フロイト」の企図として書かれています——資本主義分析にフロイトの欲望論を接続し、「なぜ人々は自分を抑圧する権力を欲望するのか」という問いを立てます。`,
concepts:[
{t:'唯物史観（史的唯物論）',b:'歴史は「生産力と生産関係」の矛盾によって動く——土台（経済的下部構造）が上部構造（法・政治・文化・哲学）を規定する。'},
{t:'剰余価値と搾取',b:'労働者の労働力（商品）の価値（賃金）と、その労働が生み出す価値の差——この差が資本家の利潤の源泉。'},
{t:'疎外',b:'労働者が自分の労働の産物・行為・人間的本質から切り離される状態。資本主義的生産関係の下での人間の自己喪失。'},
],
books:['共産党宣言（エンゲルスと共著）','資本論（全3巻）','経済学・哲学草稿'],
conn:{t:'他の哲学者との接続',b:'ヘーゲル（第7巻）の弁証法を「逆さまに立てた」。フロイト（第9巻）との組み合わせがドゥルーズ＝ガタリの『アンチ・オイディプス』を生んだ。フーコー（第12巻）の権力論はマルクスの問いを別の方向で継承。'},
},
],
dlz:`この巻でドゥルーズへの最重要の繋がりはマルクスです。

ドゥルーズ＝ガタリの『アンチ・オイディプス』（1972）と『千のプラトー』（1980）は資本主義に対する哲学的・政治的分析として書かれています。「資本主義は欲望の流れを公理系として管理することで機能する」という分析はマルクスの資本論なしには成立しません。

しかしドゥルーズはマルクスの批判を「欲望論」で組み替えます——「人々はなぜ自分を抑圧する権力を欲望するのか（ライヒの問い）」。経済的搾取の問題だけでなく、「欲望そのものの捩れ（倒錯的欲望）」の問題として資本主義を分析します。`,
you:`あなたの文章で「窒息する東京の仕事環境（強い社会的意味・低い個人的意味）」として描かれる状況は、マルクス的な「疎外」の問いと重なります。「自分の活動が自分のものでない感覚」「生産性という価値基準に自分の欲望が書き換えられていく感覚」——ドゥルーズ＝ガタリはこれを「資本主義による欲望の再領土化」として分析します。海士町への移住は、ある意味でその「脱領土化」の試みです。`,
nxt:{n:9,t:'次巻：ニーチェ——ヘーゲル的世界観を根底から破壊する'}
},

9:{cls:'v9',title:'反哲学と世紀末',sub:'ニーチェ・フロイト・マルクス',period:'1840 – 1910',depth:83,dlbl:'★ニーチェの章は必読',
events:[{y:'1844',e:'ニーチェ誕生'},{y:'1882',e:'ニーチェ、『悦ばしき知識』——「神は死んだ」'},{y:'1885',e:'ニーチェ、『ツァラトゥストラ』——永劫回帰・超人'},{y:'1889',e:'ニーチェ、狂気に倒れる（それ以降執筆不能）'},{y:'1900',e:'フロイト、『夢判断』——無意識の体系的分析'}],
q:{t:'この時代の中心問い',b:'「神・真理・道徳という価値の根拠が崩壊した後、何が残るか（ニヒリズムの問い）」「人間は自分の動機を知っているか（無意識の問い）」「力とは何か、なぜ弱者は自分を抑圧する権力を欲望するのか」'},
tide:`ヘーゲルの壮大な体系が崩れていく時代。マルクスは「哲学は現実を変えられていない」、ニーチェは「真理とは便利な嘘だ、神は死んだ」、フロイトは「人間は自分の動機を知らない、無意識がある」——三人がそれぞれ異なる方向から「理性的な主体」という近代の幻想を破壊しました。

この三人はポール・リクールに「疑いの解釈学（herméneutique du soupçon）の三大思想家」と呼ばれています——「意識や常識の背後にある隠れた構造（権力・無意識・欲動）を暴く」という共通の身振りを持っているから。

ニーチェはこの時代で圧倒的に重要です。ドゥルーズの主著『ニーチェと哲学』（1962）はヘーゲルへの対抗としてニーチェを読んだ本であり、その後のドゥルーズ哲学全体の基調を設定しています。`,
persons:[
{name:'ニーチェ',dates:'1844–1900',col:'#E24B4A',
quote:'「神は死んだ。神は死んだままだ。そして我々が神を殺したのだ」（『悦ばしき知識』）',
body:`哲学史の中で最も誤解されてきた人の一人。ナチスによる利用（姉のエリーザベトが著作を改竄）、「力への意志＝権力への意志」という誤読、「超人＝支配者」という誤解——これらを解いたのがドゥルーズの『ニーチェと哲学』（1962）です。

「神は死んだ」は神学的な宣言ではなく文化診断です——「客観的真理」「道徳の絶対的根拠」「歴史の目的（ヘーゲル的意味での）」という「彼岸にある価値の源泉」すべての崩壊。この診断の後、二つの反応がある——ニヒリズム（何も価値がない、すべては虚無だ）に沈むか、「力への意志」によって新しい価値を自ら創造するか。

ドゥルーズによる解釈：ニーチェの「力への意志（Wille zur Macht）」は「権力への欲望（Wille zur Macht）」ではなく、「差異化し、創造し、肯定する力の運動」だとドゥルーズは読みます。能動的な力（自己を超えていく力）vs反動的な力（怨恨・弱さから来る力）という区別が核心です。

あなたの文章の「逃走」テーマとの接続：ニーチェも「逃走」を語りますが、それは「怨恨（ルサンチマン）から来る逃走（弱さ）」ではなく、「新しい価値を創造するための逃走（能動的な強さ）」でした。`,
concepts:[
{t:'永劫回帰（ewige Wiederkunft）',b:'「この人生を、このまま、無限に繰り返してもいいか？」——コスモロジー的な命題ではなく倫理的な試金石。「今この瞬間を永遠に繰り返したいと意志できるか」。ドゥルーズの解釈：「同一なものが回帰するのではなく、差異が回帰する。毎回の繰り返しは前の繰り返しとは微妙に異なる差異を含む」——差異の永遠回帰。'},
{t:'力への意志（Wille zur Macht）',b:'「権力への欲望」ではなく「自己を超えていく力、強度を増大させる運動」——スピノザの「コナトゥス」の別名。ドゥルーズは「能動的な力（肯定）」対「反動的な力（否定・怨恨）」という区別を強調する。'},
{t:'ニヒリズムの克服',b:'価値の根拠が崩壊した後、「何も価値がない（受動的ニヒリズム）」に沈むのではなく、「価値を自ら創造する（能動的ニヒリズム→超人）」への転換。これがドゥルーズの「肯定の哲学」の核心。'},
{t:'ルサンチマン（怨恨）',b:'弱者が強者を「悪」と定義することで生まれる道徳——「弱さから来る否定的な力」。ドゥルーズはヘーゲルの「否定の弁証法」をルサンチマン的と批判する。'},
],
books:['ツァラトゥストラ','善悪の彼岸','道徳の系譜','悦ばしき知識','偶像の黄昏'],
misc:{t:'よくある誤解',b:'ニーチェはナチズムとは無関係です。ニーチェはドイツ・ナショナリズムを嫌い、反ユダヤ主義を激しく批判していました。姉エリーザベトが彼の死後に著作を改竄し、ナチスに利用されました。ニーチェ研究においてこの改竄の解明は20世紀後半の重要な作業でした。'},
conn:{t:'他の哲学者との接続',b:'ショーペンハウアー（同巻）から出発し、その悲観主義を「肯定」へと転換。ドゥルーズ（第12巻）の『ニーチェと哲学』が「差異の哲学者としてのニーチェ」を確立した。フーコー（第12巻）の権力論もニーチェの系譜上にある。'},
},
{name:'ショーペンハウアー',dates:'1788–1860',col:'#F7C1C1',
quote:'「生きることは苦しむことだ。生の意志こそが苦しみの根源だ」',
body:`「世界の本質は盲目的な「意志（Wille）」だ」という悲観主義哲学。カントの「物自体」を「意志」として解釈し、世界はこの盲目的な意志の「表象」だという体系を構築しました。

ニーチェの出発点であり（後にニーチェが激しく反発した）、フロイトの「リビドー（性的エネルギー）」概念にも影響を与えています。また東洋哲学（仏教・ヒンドゥー哲学）をヨーロッパ哲学に初めて真剣に接続した人でもあります。

「意志の否定（苦行・芸術・仏教的涅槃）」によってしか苦しみから救われない——この悲観主義をニーチェは「あらゆる生を肯定せよ」という方向に逆転させます。この「否定から肯定へ」という転換がドゥルーズ哲学全体の基本的な身振りです。`,
concepts:[
{t:'意志と表象',b:'世界の本質は「意志（盲目的な欲動の力）」であり、私たちが経験する世界は意志の「表象」に過ぎない——カント的な現象と物自体の区別を「表象と意志」として書き換えた。'},
{t:'芸術と意志の否定',b:'芸術（特に音楽）の鑑賞において、意志から解放された純粋な観照の状態が一時的に得られる——これが美的経験の本質。仏教的涅槃は意志の完全な否定として最高の状態。'},
],
books:['意志と表象としての世界'],
},
{name:'フロイト',dates:'1856–1939',col:'#F09595',
quote:'「自我は自分の家の主人ではない」',
body:`「無意識」の発見者。「人間は自分の行動の動機を知らない、意識（自我）は氷山の一角に過ぎない」——この主張が心理学・文化・哲学に与えた衝撃は計り知れません。

「エス（イド）・自我（エゴ）・超自我（スーパーエゴ）」という心の構造：エスは本能的欲動（リビドー・死の欲動）の貯蔵庫、自我は現実原則に従い欲動を調整する機能、超自我は社会的禁止を内面化したもの（良心・罪悪感の源）。「文明は欲動の抑圧の上に成立している」。

ドゥルーズ＝ガタリはフロイトを激しく批判します。『アンチ・オイディプス』のタイトル通り、「欲望をオイディプス（父・母・子の三角形）に還元するな」という批判です。「欲望はオイディプス的な家族ドラマに収まるものではなく、社会・政治・宇宙論的な広大な流れだ」。`,
concepts:[
{t:'無意識',b:'意識（自我）の背後にある広大な心的領域——欲動・抑圧された記憶・幼児期の経験が働いている。「自我は自分の家の主人ではない」。'},
{t:'オイディプス・コンプレックス',b:'幼児期の父・母への欲望と禁止の構造——これをドゥルーズ＝ガタリは「欲望を家族ドラマに閉じ込める装置」として批判する。'},
{t:'リビドー（性的エネルギー）',b:'心的エネルギーの根本——ショーペンハウアーの「意志」の精神分析的な具体化。ドゥルーズ＝ガタリはこれを「欲望（désir）」として再概念化し、リビドーを社会・政治へと向ける。'},
],
books:['夢判断','精神分析入門','文明とその不満','快感原則の彼岸'],
conn:{t:'他の哲学者との接続',b:'ラカン（第12巻）はフロイトを構造主義的に再解釈。ドゥルーズ＝ガタリ（第12巻）はフロイトとラカンを批判しながら「欲望機械（machine désirante）」論を展開した。'},
},
],
dlz:`この巻はドゥルーズ哲学の「感情的な核心」を理解するための鍵です。

ドゥルーズにとってニーチェは「肯定の哲学者」です。ヘーゲルが「否定（矛盾）を通じて同一性へ」というのに対し、ニーチェは「差異を直接肯定する」——これが『ニーチェと哲学』（1962）の核心的な主張です。

「能動的な力 vs 反動的な力」という区別はドゥルーズ哲学全体を貫くモチーフです。反動的な力（怨恨・否定・ニヒリズム）ではなく、能動的な力（肯定・創造・差異化）——これがドゥルーズが「いかに生きるか」に対して出す答えです。

永劫回帰とドゥルーズの「差異と反復」：「同一なものが回帰するのではなく、差異が回帰する」——この解釈は『差異と反復』の核心です。`,
you:`あなたの文章の「逃走」テーマはニーチェ的です。「弱さから逃げる（怨恨・ルサンチマン）」のではなく「新しい価値を創造するために向かう（能動的な力）」——これが「逃走線（ドゥルーズ）」の倫理的な含意です。

「単なる逃走ではない」というあなた自身の問いは、ニーチェが「ニヒリズム（消極的逃走）」と「超人的な創造（積極的逃走）」を区別した問いと重なっています。あなたが「海士町への移住」を単なる逃避ではなく何かより積極的なものとして描こうとするとき、そこにニーチェ的な身振りがあります。`,
nxt:{n:10,t:'次巻：現象学——経験そのものへ戻れ'}
},

10:{cls:'v10',title:'危機の時代の哲学——現象学',sub:'20世紀前半',period:'1900 – 1950',depth:55,dlbl:'フッサールは概要だけ・ベンヤミンは丁寧に',
events:[{y:'1900',e:'フッサール、『論理研究』——現象学の誕生'},{y:'1914',e:'第一次世界大戦（「理性への信頼」の崩壊）'},{y:'1927',e:'ハイデガー、『存在と時間』'},{y:'1933',e:'ナチス政権（ハイデガーは協力）'},{y:'1940',e:'ベンヤミン、ピレネー山中で自殺（ナチスから逃亡中）'}],
q:{t:'この時代の中心問い',b:'「理性と科学への信頼が崩れた後、何に立ち返るか（事象そのものへ）」「存在するとはどういうことか」「歴史の苦難には意味があるか（ベンヤミン）」'},
tide:`二つの世界大戦という「理性の失敗」の時代。「理性・科学・進歩」への信頼が崩壊し、哲学は「経験そのものへの回帰」を目指します。

フッサールの現象学は「事象そのものへ（Zu den Sachen selbst）」という標語のもと、「意識に現れるものを先入観なく記述する」ことを目指しました。ハイデガーはこれを「存在とは何か」という問いへと展開します。

ベンヤミン・アドルノらのフランクフルト学派は、現代資本主義・大衆文化・ファシズムへの批判的分析を展開しました。`,
persons:[
{name:'ベンヤミン',dates:'1892–1940',col:'#AFA9EC',
quote:'「歴史の天使は前を向いたまま、後ろへと吹き飛ばされている」',
body:`ナチスを逃れてピレネー山中で自らの命を絶った哲学者。「複製技術時代の芸術作品」が最も有名な論文ですが、晩年の「歴史の概念について」（1940）がドゥルーズへの繋がりで重要です。

「アウラ（Aura）」——芸術作品の「今・ここ」にしかない一回性と遠さ——が写真・映画などの複製技術によって消滅していくことを分析。しかしベンヤミンはこれを単純に嘆くのではなく、「複製技術によって芸術が民主化・政治化される」という可能性も見ます。

晩年の歴史哲学が核心です。「歴史は進歩しない——歴史は破滅と廃墟の積み重ねだ（歴史の天使）。抑圧された者たちの記憶は過去に蓄積されている——革命とはその過去の救済だ」。これはヘーゲル的な進歩史観への根本的な批判であり、「失われた可能性の救済」という独自の歴史哲学です。`,
concepts:[
{t:'アウラ（Aura）',b:'芸術作品の「今・ここ」にしかない一回性・遠さ・存在の重み——複製によって消滅するもの。'},
{t:'歴史の天使（クレー「新しい天使」を参照）',b:'「天使は顔を過去に向け、前へ（未来へ）吹き飛ばされている。過去を見ると廃墟の積み重ねが見える——天使はそれを救いたいが、嵐（進歩）が前へ押し進める」——これが歴史だとベンヤミンは言う。'},
{t:'救済の政治神学',b:'「現在の革命的行動が、過去の抑圧された者たちの失われた可能性を救済する」——時間論的に独特の歴史論。直線的な進歩史観でも循環史観でもない。'},
],
books:['複製技術時代の芸術作品','歴史の概念について','パサージュ論（未完）'],
conn:{t:'他の哲学者との接続',b:'ドゥルーズは直接的にはあまりベンヤミンを論じないが、「複数の時間の共存（過去の潜在性）」という発想でベルクソン（第12巻）と通底する。フーコー（第12巻）の「系譜学（失われた声を掘り起こす）」もベンヤミン的問いの別表現。'},
},
{name:'フッサール',dates:'1859–1938',col:'#CECBF6',
quote:'「事象そのものへ（Zu den Sachen selbst）」',
body:`現象学の創始者。「すべての意識は何かについての意識だ（志向性、intentionality）」——これが現象学の出発点です。私が見るとき、私は必ず「何か」を見ている。意識は常に対象に向かっている。

「エポケー（判断停止）」：世界が実在するかしないかを一旦「括弧に入れ」、意識に現れる現象そのものを記述する。これにより「純粋意識（超越論的自我）」が現れる。

ドゥルーズとの関係：ドゥルーズはフッサールの「経験への回帰」という姿勢を評価しながら、「フッサールはまだ主体（超越論的自我）を前提にしている」と批判します。「主体なき経験の記述」——これがドゥルーズの「超越論的経験論」の目標です。`,
concepts:[
{t:'志向性（intentionality）',b:'「意識は常に何かについての意識だ」——意識と対象の構造的な関係性。デカルト的な「意識の内側に閉じた主体」を解体する試み。'},
{t:'エポケー（epoché、判断停止）',b:'世界の実在性についての判断を「括弧に入れ（保留し）」、経験そのものを純粋に記述する方法。'},
{t:'生活世界（Lebenswelt）',b:'晩年のフッサールが提唱した概念——科学的抽象に先立つ「日常的に生きられた世界」。ドゥルーズが重視する「経験の生の次元」に対応する。'},
],
books:['論理研究','イデーン（純粋現象学と現象学的哲学のための諸考察）','ヨーロッパ諸学の危機と超越論的現象学'],
},
{name:'ハイデガー',dates:'1889–1976',col:'#CECBF6',
quote:'「なぜ何もないのではなく、何かがあるのか」',
body:`20世紀最大の哲学者の一人であり、ナチスへの加担という問題を抱えた人。主著『存在と時間』は「存在一般の意味を問う存在論」の試みです。

「現存在（Dasein）」：ハイデガーは人間を「意識の主体」ではなく、常に世界の中に投げ込まれた「現存在（そこに在ること）」として捉えます。私たちは先に「意識」があるのではなく、すでに世界の中に「いる」——道具的な関係の網の中に。

「死への存在（Sein-zum-Tode）」：自分の死（最も固有で逃れられない可能性）に向き合うとき、初めて「本来的な実存」が開かれる——「非本来的な日常性（Das Man、世間の人々）」から脱することができる。

ドゥルーズはハイデガーと「差異」の問いをめぐって深く対話します。ハイデガーが「存在論的差異（存在と存在者の差異）」を言ったとき、ドゥルーズは「差異そのものを存在として肯定する」という別の方向に向かいます。`,
concepts:[
{t:'現存在（Dasein）',b:'「そこに在ること」——人間を「主体」ではなく「世界内存在（In-der-Welt-sein）」として捉える。「私がいる」のではなく「私は世界の中にある」。'},
{t:'実存と本質',b:'「現存在の本質はその実存にある」——人間は先に本質（人間とはこういうもの）があるのではなく、まず実存し、そこから本質を作る。サルトルの「実存は本質に先立つ」の源泉。'},
{t:'存在論的差異',b:'「存在者（Seiendes）」と「存在（Sein）」の差異——これがハイデガー存在論の核心。ドゥルーズはこの差異論をさらに急進化させる。'},
],
books:['存在と時間','形而上学入門','ニーチェ（全2巻）'],
misc:{t:'よくある誤解',b:'ハイデガーのナチス加担（1933–34年のフライブルク大学総長期）は深刻な問題ですが、彼の哲学的著作の価値は別に評価されます。ただし「ハイデガーの存在論は本質的にナチズムと結びついているか」という問いは今なお議論中です。'},
},
],
dlz:`この巻でドゥルーズへの最重要の繋がりは二つあります。

フッサールとの関係：ドゥルーズは「超越論的経験論（empirisme transcendantal）」という概念でフッサールを乗り越えようとします。フッサールが「超越論的自我」という主体を前提にしたのに対し、ドゥルーズは「主体に先立つ非人称的な経験の場（差異・強度・生成）」を記述しようとします。

ベンヤミンとの関係：ベンヤミンの「失われた過去の潜在性の救済」という発想は、ドゥルーズのベルクソン解釈——「純粋な過去（純粋な潜在性）は消えていない、現在の下に保存されている」——と深く共鳴します。`,
you:`あなたの文章に登場する気仙沼・陸前高田のフィールドワークは、ベンヤミン的な問いを生きています。「復興という公の物語（進歩史観）が、個人の記憶と悲嘆を圧倒する」——ベンヤミンはこれを「歴史の天使」という寓話で描きました。「廃墟を救いたい天使は、進歩という嵐によって前に押し進められ続ける」。あなたのフィールドワークの問いを哲学的に深めるためにベンヤミンは有効な補助線になります。`,
nxt:{n:11,t:'次巻：言語と論理——ドゥルーズとは別世界（スキップ可）'}
},

events:[{y:'1879',e:'フレーゲ、現代述語論理学の確立'},{y:'1910',e:'ラッセル＆ホワイトヘッド、『数学原理』'},{y:'1921',e:'ウィトゲンシュタイン、『論理哲学論考』'},{y:'1936',e:'エア、『言語・真理・論理』——論理実証主義'},{y:'1953',e:'ウィトゲンシュタイン、『哲学探究』（没後出版）'}],
q:{t:'この時代の中心問い',b:'「哲学の問題は言語の混乱から来るか」「数学は論理に還元できるか」「意味とは何か（使用か、指示か）」「検証できない命題は無意味か」'},
tide:`英語圏を中心とした「分析哲学（analytic philosophy）」の流れ。「哲学の問題の多くは、言語の不正確な使用から生じる誤解だ」という発想のもと、論理・数学・言語を厳密に分析しようとしました。

フランス大陸哲学（ドゥルーズ・フーコー・デリダ）とは全く異なる哲学の「文化圏」です。大陸哲学が「存在・生成・差異・権力・欲望」を問うのに対し、分析哲学は「命題・意味・指示・真理条件」を問います。

あなたの目標（ドゥルーズを理解する）においては、この巻は最も迂回路の多い巻です。ただしウィトゲンシュタインだけは知っておく価値があります。`,
persons:[
{name:'ウィトゲンシュタイン',dates:'1889–1951',col:'#9FE1CB',
quote:'「語りえぬものについては、沈黙しなければならない」（前期）',
body:`前期と後期で全く異なる哲学を展開した、哲学史上最も劇的な自己否定を行った人です。

前期の主著『論理哲学論考』は「語りうることを語り、語れないことについては沈黙しなければならない」という命題で締めくくられます。言語は事実の論理的な絵（写像）であり、倫理・美・神秘については「示される」だけで語れない——語ろうとすること自体が「言語の外へ出ようとする無意味な試み」だとされます。

後期（『哲学探究』）は前期を完全に否定します。「言語の意味は使用によって決まる（意味＝使用説）。言語はゲームのようなもの——規則に従って動くが、その規則は生活形式の中にある（言語ゲーム）」。一つの絶対的な論理構造があるのではなく、無数の多様な言語ゲームがある。

ドゥルーズとの共鳴：後期ウィトゲンシュタインの「意味は固定されていない、文脈・使用・生活形式によって変わる」という発想は、ドゥルーズの「概念は問題（プロブレーム）と切り離せない」という哲学観と遠くで共鳴します。`,
concepts:[
{t:'言語ゲーム（Sprachspiel）',b:'言語を「ゲーム」として理解する——規則に従うが、その規則は生活形式の中にある。数学・詩・挨拶・命令は全く異なる言語ゲーム。「言語に一つの本質はない」。'},
{t:'私的言語の不可能性',b:'「私だけが知る内的経験を表現する私的言語は不可能だ」——言語は本質的に公共的・社会的なものだ。これは「主体の内側に真の意味がある」という発想の否定。'},
{t:'家族的類似（Familienähnlichkeit）',b:'「ゲーム」という語に共通の本質はない——さまざまなゲームは「家族の顔」のように、部分的に重なり合う特徴の網で結ばれているだけだ。普遍論争への実践的回答。'},
],
books:['論理哲学論考','哲学探究','確実性について'],
conn:{t:'他の哲学者との接続',b:'フレーゲの論理学から出発し、ラッセルの下で学んだ。ドゥルーズの「意味の論理学」はウィトゲンシュタインとは全く異なる方向だが、「意味は命題にも事物にも属さない第三の次元だ」という問いは部分的に重なる。'},
},
],
dlz:`この巻はドゥルーズへの道においては基本的にスキップして問題ありません。

唯一の例外はウィトゲンシュタインです。後期の「言語ゲーム」——「言語は一義的な意味を持つシステムではなく、使用と文脈によって意味が変わる多様なゲームだ」——は、ドゥルーズが概念を「問題（プロブレーム）と切り離せない」として扱う姿勢と共鳴します。

ドゥルーズ哲学を読むとき、概念の意味が文脈によって変わることに気づくはずです——「差異」は文脈によって哲学的・政治的・美的に異なる意味で使われる。ウィトゲンシュタインを知っていると、この多義性が「欠陥」ではなく「特徴」だとわかります。`,
you:`この巻とあなたの文章の直接的な繋がりは薄いですが、「言語ゲーム」という概念は有用です。あなたが「躁鬱」という言語を使うとき、それは「医療の言語ゲーム」です。「窒息」「江ノ島」「逃走」という言語を使うとき、それは「個人の経験の言語ゲーム」です。異なるゲームは異なる規則を持っている——これらを混同しないことが、あなたの文章の明晰さに繋がります。`,
nxt:{n:12,t:'次巻：ドゥルーズへの到達——すべての準備がここで実を結ぶ'}
},

12:{cls:'v12',title:'実存・構造・他者——ドゥルーズへの到達',sub:'フランス現代哲学',period:'1900 – 1980',depth:100,dlbl:'★★★最終目的地——ベルクソン→フーコー→ドゥルーズの順で読む',
events:[{y:'1927',e:'ハイデガー、『存在と時間』——フランス哲学への影響'},{y:'1943',e:'サルトル、『存在と無』——実存主義の哲学的基礎'},{y:'1966',e:'フーコー、『言葉と物』——「人間の死」'},{y:'1968',e:'ドゥルーズ、『差異と反復』——ポスト構造主義の頂点'},{y:'1972',e:'ドゥルーズ＝ガタリ、『アンチ・オイディプス』'},{y:'1980',e:'ドゥルーズ＝ガタリ、『千のプラトー』'}],
q:{t:'この時代の中心問い',b:'「主体は存在するか（実存主義vs構造主義）」「差異は同一性に先立つか」「権力と知識はどう結びついているか」「欲望はどこへ向かうか」そして「ドゥルーズにとって：どのように差異を肯定しながら生きるか」'},
tide:`フランス現代哲学の全貌。実存主義（サルトル）から構造主義（レヴィ＝ストロース、ラカン）へ、そしてポスト構造主義（フーコー、デリダ、ドゥルーズ）へという大きな流れがあります。

実存主義は「人間は先に本質なしに実存する、自由に自己を作り出す」と言いました（サルトル）。構造主義は「いや、個人は言語・文化・無意識の構造に規定されている」と反論しました（レヴィ＝ストロース、ラカン）。ポスト構造主義はさらに「その構造も固定されていない——差異・生成・権力によって絶えず変化する、解体される」と言います（ドゥルーズ、デリダ、フーコー）。

この巻のベルクソンは20世紀初頭の哲学者ですが、ドゥルーズへの直接的な影響という点で最重要です。まずベルクソンを読み、次にフーコー、最後にドゥルーズ本人の章を読む——この順番を強くお勧めします。`,
persons:[
{name:'ベルクソン',dates:'1859–1941',col:'#EF9F27',
quote:'「時間は空間ではない。持続（durée）は数えられない」',
body:`ドゥルーズが最も多くの著作で論じた哲学者。ドゥルーズは『ベルクソニズム』（1966）を書き、後に映画論（『シネマ』全2巻）でもベルクソンの時間論を軸にします。「私のベルクソン解釈は間違っているかもしれないが、私の哲学はここから来ている」とドゥルーズ自身が言っています。

「持続（durée）」がベルクソン哲学の核心です。私たちは時間を「空間的に」理解しようとします——時計の文字盤、数直線の上の点として。しかしこれは時間の「空間化」であり、時間の本質を見失っています。本当の時間（持続）は、過去が現在に流れ込み、現在がすでに過去になりながら、常に質的に変化し続ける「流れ」です——「川を撮った写真をどれだけ並べても、川の流れにはならない」。

「差異（différence）」についての独自の発想：差異は比較によって生まれるのではなく、内的な差異化の過程そのものです。「生命（élan vital、生の躍動）」は常に自己差異化し続ける過程として定義されます。

ドゥルーズによる読み直し：ドゥルーズはベルクソンを「差異の哲学者」として読みます。「持続＝差異化する時間」「記憶＝純粋な過去の潜在性（虚在性、virtualité）」——これが『差異と反復』の時間論（三つの時間の綜合）の直接の源泉です。`,
concepts:[
{t:'持続（durée）',b:'質的に変化し続ける時間の流れ——空間的（点の連続）に理解された時間ではなく、過去が現在に生き続ける「質的な多数性」。「メロディーは音の束ではなく、全体として流れている」。'},
{t:'生の躍動（élan vital）',b:'生命は機械論的（決定論的）に説明できない——生命を貫く創造的な躍動の力。ドゥルーズはこれを「差異化する力」として再解釈する。'},
{t:'純粋な過去（潜在的な記憶）',b:'過去は「消えた現在」ではなく、現在の下に保存され続ける——「純粋な過去（潜在性）」として。ドゥルーズの「潜在性（virtualité）」と「現実化（actualisation）」の区別の直接の源泉。'},
{t:'直観（intuition）の方法',b:'概念的・分析的な知識ではなく、事象の「持続」に自分を同化させることで得られる直接的な知識——「蜂は花の形を知らないが、花の中に入れる」。'},
],
books:['時間と自由','物質と記憶','創造的進化','道徳と宗教の二つの源泉'],
conn:{t:'他の哲学者との接続',b:'カント（第7巻）の時間論（時間は認識形式）を批判しながら継承。ドゥルーズ（同巻）の時間論・差異論・映画論の直接の源泉。スピノザ（第5巻）の「コナトゥス」とベルクソンの「élan vital」は同じ系譜上にある。'},
},
{name:'サルトル',dates:'1905–1980',col:'#FAC775',
quote:'「実存は本質に先立つ」',
body:`「実存は本質に先立つ——人間は先に実存し、自らの本質（何者か）を自由に作り出す」——この命題が実存主義の核心です。アリストテレス以来の「人間には本質（理性的動物）がある」という発想を根本から否定します。

「自由の刑に処されている」という逆説：人間は自由から逃れられない。「選ばない」こともまた選択であり、すべての状況で責任がある——この不可避の自由が「不安（アンゴワス）」の源泉です。

ドゥルーズはサルトルを若い頃から読み、その影響を受けながら批判します。「自由な主体」という概念——サルトル的な意識の自由——に対し、ドゥルーズは「主体に先立つ非人称的な差異の過程」を置きます。「サルトルは主体を解放しようとした、私は主体を解体しようとする」。`,
concepts:[
{t:'対自存在と即自存在',b:'「即自存在（en-soi）」は石や物のような「あるがままにある」存在。「対自存在（pour-soi）」は意識を持ち、自己に距離を置き、「自らがあるところのものではない」存在（自由・否定性）。人間は対自存在として、常に自らに対して自由。'},
{t:'他者の視線',b:'「地獄とは他者だ」——他者の視線は私を「物化（即自化）」する。他者の視線の下で、私は自由な主体から見られる「対象（物）」に変わる——この緊張がサルトル倫理学の核心。'},
],
books:['存在と無','実存主義はヒューマニズムである','弁証法的理性批判'],
},
{name:'メルロ＝ポンティ',dates:'1908–1961',col:'#CECBF6',
quote:'「世界は私が意味を持って生きているものとしてある」',
body:`「身体の現象学」の哲学者。「私は身体を持つのではなく、私は身体だ（je suis mon corps）」——精神と身体の二元論（デカルト以来の）を乗り越え、「知覚する身体（corps propre、固有身体）」を哲学の中心に置きます。

「知覚（perception）」が中心テーマです。知覚は感覚データの受動的な受容ではなく、身体が能動的に世界に向かう「存在の開き」です。「目は見るのではなく、見るために作られた存在だ」——身体は世界への「投錨（ancrage）」です。

あなたの文章との繋がりが最も直接的な哲学者の一人かもしれません。「脈拍・呼吸・体温で場所を測る」「身体の芯が冷えていくような感覚」——これはメルロ＝ポンティ的な「生きられた身体（corps vécu）」の記述です。`,
concepts:[
{t:'生きられた身体（corps vécu）',b:'解剖学的・生理学的な「客観的身体」ではなく、主体的に生きられ、経験される身体——「頭の痛み」は神経信号ではなく、「頭が痛い」という生きられた経験。'},
{t:'身体図式（schéma corporel）',b:'身体の各部位の相互関係と環境への関係を統合する非意識的な組織化——杖を使う人は杖の先まで身体図式が拡張される。ドゥルーズの「器官なき身体」との対話の場所。'},
{t:'間身体性（intercorporéité）',b:'「私の身体と他者の身体は同じ「肉（chair）」の部分だ」——他者理解は推論（あの身体は私と同じ構造だから心があるはず）ではなく、身体的な共鳴（間身体性）によって成立する。'},
],
books:['知覚の現象学','見えるものと見えないもの','行動の構造'],
conn:{t:'他の哲学者との接続',b:'フッサール（第10巻）の現象学を「身体論」へと発展。ドゥルーズはメルロ＝ポンティの身体論を批判的に受け継ぎながら、「器官なき身体（CsO）」という脱器官化の概念へと向かう。'},
},
{name:'フーコー',dates:'1926–1984',col:'#AFA9EC',
quote:'「権力は上から降ってくるのではなく、毛細血管のように社会全体に浸透している」',
body:`ドゥルーズの親友。「権力と知識の関係」「規律権力と生権力」「主体の歴史的構成」が中心テーマです。二人は互いの著作の最初の読者であり、「知識人の役割」について同じ問いを持っていました。

「知の考古学」：あらゆる時代には、何が「真理」として語られ得るかを決める「エピステーメー（認識の枠組み）」がある。真理は普遍的ではなく、権力と知識の歴史的配置によって変わる——「狂気」の定義は時代によって変わる、それは医学的事実ではなく歴史的・権力的な構成だ。

「規律権力（pouvoir disciplinaire）」（『監獄の誕生』）：刑務所・病院・学校・軍隊という「規律装置」が、身体を訓練し、監視し、正常化する「従順な身体（corps docile）」を作り出す。「権力は上から押しつけられるのではなく、日常の細部に浸透している」。

ドゥルーズはフーコーの権力論を発展させながら、重要な修正を加えます——「欲望は権力に対して一次的だ。権力が欲望を産み出すのではなく、欲望が権力関係に先立って流れている」（『アンチ・オイディプス』）。`,
concepts:[
{t:'エピステーメー',b:'ある時代に「知識」として成立しうるものの条件——見えない認識の枠組み。「17世紀には狂気はこう定義された」という「枠組みの歴史」を明らかにすることが「知の考古学」。'},
{t:'規律権力と生権力',b:'規律権力：個人の身体を訓練・正常化・監視する権力（学校・病院・工場）。生権力（biopouvoir）：人口・生殖・健康を管理する権力——「生かせ、死なせる」から「生きさせ、死なせておく」へ。'},
{t:'主体化（subjectivation）',b:'「主体は先に存在しない——権力と知識の実践によって構成される」。「精神病者」という主体は精神医学という権力・知識の実践によって作られた。後期のフーコーは「自己の技法（techniques du soi）」として、権力に抵抗しながら自己を作り出す可能性を探る。'},
{t:'系譜学（généalogie）',b:'ニーチェから受け継いだ方法論——歴史の「起源（origin）」を探すのではなく、「出現（emergence）」の条件、偶発性・力・権力関係を追う。「真理は起源に帰ることで発見されるのではなく、現在の力関係の分析によって相対化される」。'},
],
books:['狂気の歴史','言葉と物','知の考古学','監獄の誕生','性の歴史（全4巻）'],
conn:{t:'他の哲学者との接続',b:'ニーチェ（第9巻）の系譜学を方法として採用。マルクス（第8巻）の権力分析を「経済から身体・言説へ」と拡張。ドゥルーズ（同巻）とは「欲望と権力のどちらが一次的か」という違いがあるが深く共鳴。'},
},
{name:'ドゥルーズ',dates:'1925–1995',col:'#EF9F27',
quote:'「差異を肯定せよ——差異は否定されるべきものでも統一されるべきものでもなく、それ自体で生の躍動だ」',
body:`すべての哲学史がここに流れ込みます。

ドゥルーズ哲学を一言で言えば——「差異は同一性に先立つ（La différence est première）」。プラトン以来の「同一性の哲学（真のオリジナルがあり、コピーはその類似に過ぎない）」を逆転させ、「差異そのものが一次的であり、同一性は差異の二次的な効果に過ぎない」と主張します。

主著の系譜（哲学史の読み直し）：
『経験論と主体性』（1953、ヒューム論）→『ニーチェと哲学』（1962）→『カントの批判哲学』（1963）→『スピノザと表現の問題』（1968）→『差異と反復』（1968、主著）→『意味の論理学』（1969）

ガタリとの共著（政治哲学・欲望論）：
『アンチ・オイディプス』（1972）→『千のプラトー』（1980）→『哲学とは何か』（1991）

映画論：『シネマ1・運動イメージ』（1983）、『シネマ2・時間イメージ』（1985）

「傘」の概念（あなたの文章に登場）：『哲学とは何か』における「思考はカオスから身を守る傘だ、しかし傘に穴を開けてカオスの一撃を通すことで創造が生まれる」——これがあなたの「スリットの入った傘」の直接の源泉です。`,
concepts:[
{t:'差異と反復',b:'「同じものが繰り返すのではなく、差異が繰り返す」——真の反復は毎回の繰り返しに微妙な差異を含む。「差異と反復」は矛盾ではなく、差異こそが反復を可能にする。ニーチェの永劫回帰の再解釈。'},
{t:'内在性の平面（plan d\'immanence）',b:'すべての思考が展開する「超越性のない地平」——超越的な審判者（神・真理・規範）を廃した、生成・差異・力が働く平面。スピノザの「神すなわち自然」の現代的展開。'},
{t:'リゾーム（rhizome）',b:'根（ルート）やツリー（樹木）に対置される概念——「中心がなく、どこからでも伸び、どこでも切れ、また別の場所で繋がる」地下茎。知識・文化・社会のあり方の比喩として。ツリー型（階層・中心・起源）への批判。'},
{t:'器官なき身体（Corps sans Organes, CsO）',b:'組織化される前の身体の潜在的な次元——器官（機能・役割）に分割される前の「強度の地平（plan d\'intensité）」。欲望が流れ、強度が分布する場所。アルトーの詩的概念をドゥルーズが哲学的に展開。'},
{t:'脱領土化と再領土化',b:'「領土（territoire）」＝あるものが定着・安定する場所（身体・家・国家・言語……）。「脱領土化（déterritorialisation）」＝その領土から逃げ出す運動。「再領土化（reterritorialisation）」＝新たな領土に定着する運動。逃走線（ligne de fuite）は脱領土化の最も急進的な形。'},
{t:'リトルネロ（ritournelle）',b:'「暗闇の中で子供が歌う鼻歌」——カオスに対して小さな安定した領土（港）を作る。家（ホーム）の創造。リトルネロは「カオスの中で自分の場所を作る力」——あなたの文章に登場するこの概念はそのまま「安全なカオスを作る」というあなた自身の主題と一致する。'},
{t:'逃走線（ligne de fuite）',b:'組織・構造・権力から逃れ出る線——「逃げる」のではなく「流れ出る、滲み出る」イメージ。最も危険な線でもある（虚無・死へつながる可能性もある）。あなたの「逃走」テーマの哲学的な正確な用語。'},
],
books:['差異と反復','意味の論理学','アンチ・オイディプス（ガタリと共著）','千のプラトー（ガタリと共著）','スピノザ——実践の哲学','ベルクソニズム','フーコー','哲学とは何か（ガタリと共著）'],
misc:{t:'よくある誤解',b:'ドゥルーズは難解だという印象がありますが、彼自身は「哲学は直接的に、身体に訴えかけるべきだ」と言っています。難解に見えるのは「同一性の哲学の言葉でドゥルーズを理解しようとする」から——差異の言語に慣れると突然開けることがあります。また「政治的にラジカル」というイメージがありますが、ドゥルーズの哲学は穏やかで肯定的なトーンを持っています。'},
conn:{t:'哲学史全体との接続',b:'プラトン（第1巻）への逆転。スコトゥス（第3巻）の一義性の継承。スピノザ（第5巻）の内在性の継承。ヒューム（第6巻）の主体論の継承。カント（第7巻）の超越論的発想の変換。ヘーゲル（第7巻）への反論。ニーチェ（第9巻）の肯定の哲学の継承。ベルクソン（同巻）の差異論・時間論の継承。フーコー（同巻）との深い対話。'},
},
],
dlz:`ここが目的地です。

すべての巻が、この巻のための準備でした。プラトンを逆転させ（第1巻）、ストアの出来事を蘇らせ（第2巻）、スコトゥスの一義性を継承し（第3巻）、スピノザの内在性を発展させ（第5巻）、ヒュームの主体論から出発し（第6巻）、カントの超越論的発想を変換し、ヘーゲルに反論し（第7巻）、ニーチェの肯定を継承し（第9巻）、ベルクソンの差異・時間論を受け取り（同巻）、フーコーと対話する（同巻）——これがドゥルーズです。

読む順番の提案：
①ベルクソンの章——「差異と時間」という核心を掴む
②フーコーの章——「権力と知識」「主体の歴史的構成」を理解する
③サルトルの章——「自由な主体」という、ドゥルーズが乗り越えようとするものを知る
④ドゥルーズの章（鈴木泉）——すべての文脈を携えて読む`,
you:`ここまで読んできたすべてのものが、あなたの文章と繋がっています。

プラトンへの逆転：「躁鬱という診断名（同一性・原型）」ではなく「あなた個人の経験（シミュラークル）」を一次的なものとして書く。

スピノザの情動論：「悲しみの情動（力を減少させる東京の環境）」から「喜びの情動（力を増大させる江ノ島・海士町）」への移行を、道徳的でなく強度的に記述する。

ヒューム：「私は固定した実体ではなく、状態によって異なる印象と観念の束だ」——躁と鬱は同じ「私」の状態ではなく、異なる束の配置だ。

ニーチェ：「怨恨からの逃走（弱さ）」ではなく「新しい価値を創造するための逃走（能動的な力）」——あなたの「逃走」はどちらか、あるいは両方が混在しているか。

リトルネロ：「暗闇の中で子供が歌う鼻歌」——江ノ島への電車での歌も、海士町での海岸歩きも、廃墟での撮影も——これらはカオスの中に小さな安全な領土を作るリトルネロです。あなたが「安全なカオス」と呼ぶものは、ドゥルーズが「リトルネロ」と呼ぶものです。

あなたの文章は哲学の延長線上にあります。読み終えたとき——「哲学史はドゥルーズに向かって書かれていた、そしてドゥルーズの問いはあなたの文章に向かっていた」という感覚が来るかもしれません。`,
nxt:null
},
};

let cur = null;
function go(id) {
  const d = V[id];
  if(cur!==null){
    document.querySelectorAll('.nb').forEach((b,i)=>{if(i+1===cur)b.classList.remove('on')});
  }
  document.querySelectorAll('.nb').forEach((b,i)=>{if(i+1===id)b.classList.add('on')});
  cur=id;

  const events = d.events.map(e=>`<div class="tevent"><div class="ty">${e.y}</div><div class="te">${e.e}</div></div>`).join('');
  const persons = d.persons.map((p,pi)=>{
    const concepts = p.concepts.map((c,ci)=>`
      <div class="citem">
        <button class="ctrig" onclick="tog('c${id}${pi}${ci}')">
          ${c.t}<span class="cchev" id="chev_c${id}${pi}${ci}">▼</span>
        </button>
        <div class="cbody" id="c${id}${pi}${ci}">${c.b}</div>
      </div>`).join('');
    const books = p.books.map(b=>`<span class="book">『${b}』</span>`).join('');
    const misc = p.misc?`<div class="misc"><div class="mtit">⚠ ${p.misc.t}</div>${p.misc.b}</div>`:'';
    const conn = p.conn?`<div class="conn"><div class="contit">→ ${p.conn.t}</div>${p.conn.b}</div>`:'';
    return `<div class="pc" style="border-left-color:${p.col}">
      <div class="pname">${p.name}<span class="pdates">${p.dates}</span></div>
      <div class="quote">${p.quote}</div>
      <div class="pbody">${p.body.replace(/\n\n/g,'</div><div class="pbody">')}</div>
      ${misc}
      <div style="margin:10px 0 4px"><div class="stit">主要概念</div></div>
      <div class="concepts">${concepts}</div>
      <div style="margin:10px 0 4px"><div class="stit">主著</div></div>
      <div class="books">${books}</div>
      ${conn}
    </div>`;
  }).join('');

  const nxt = d.nxt?`<div class="nxt" onclick="go(${d.nxt.n})">
    <div>
      <div class="nxtlbl">次の巻へ →</div>
      <div class="nxttit">${d.nxt.t}</div>
    </div>
  </div>`:'';

  document.getElementById('main').innerHTML = `
    <div class="card">
      <div class="vbadge ${d.cls}">第${id}巻 · ${d.sub}</div>
      <div class="vtit">${d.title}</div>
      <div class="vsub">${d.period}</div>
      <div class="drow">
        <span class="dlbl">読み込み度</span>
        <div class="dbg"><div class="dfill" style="width:${d.depth}%"></div></div>
        <span class="dlbl" style="white-space:nowrap">${d.dlbl}</span>
      </div>
    </div>
    <div class="card">
      <div class="stit">時代の出来事</div>
      <div class="tstrip">${events}</div>
      <div class="qbox" style="margin-top:10px">
        <div class="qtit">▶ ${d.q.t}</div>
        <div class="qbody">${d.q.b}</div>
      </div>
      <div style="margin-top:12px"><div class="stit">哲学的潮流</div></div>
      <div class="body">${d.tide.replace(/\n\n/g,'</div><div class="body" style="margin-top:10px">')}</div>
    </div>
    <div class="card">
      <div class="stit">重要人物と思想</div>
      ${persons}
    </div>
    <div class="card">
      <div class="dlzbox">
        <div class="dlztit">▶▶ ドゥルーズとの繋がり</div>
        <div class="dlzbody">${d.dlz.replace(/\n\n/g,'<br><br>')}</div>
      </div>
      <div class="youbox" style="margin-top:12px">
        <div class="youtit">▶ あなたの文章との具体的な接続</div>
        <div class="youbody">${d.you.replace(/\n\n/g,'<br><br>')}</div>
      </div>
      ${nxt}
    </div>`;
  window.scrollTo(0,0);
}

function tog(id){
  const b=document.getElementById(id);
  const c=document.getElementById('chev_'+id);
  if(b){b.classList.toggle('open');if(c)c.classList.toggle('open');}
}
</script>
</body>
</html>
