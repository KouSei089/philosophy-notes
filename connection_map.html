<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私・ドゥルーズ・哲学者・概念の繋がりマップ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Hiragino Sans','Yu Gothic',sans-serif;background:#0f0f0f;color:#f0f0f0;overflow-x:hidden}

/* header */
.hdr{padding:14px 16px 10px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr h1{font-size:14px;font-weight:600;color:#e0e0e0}
.hdr p{font-size:11px;color:#666;margin-top:2px}
.legend{display:flex;gap:10px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:#888}
.legdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* map container */
.map-wrap{position:relative;width:100%;overflow:auto}
#map{position:relative;min-width:900px;min-height:780px}
#svg-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

/* nodes */
.node{position:absolute;transform:translate(-50%,-50%);cursor:pointer;transition:transform .15s,filter .15s;z-index:10}
.node:hover{transform:translate(-50%,-50%) scale(1.07);filter:brightness(1.15)}
.node.active{transform:translate(-50%,-50%) scale(1.1);filter:brightness(1.2)}
.nbody{border-radius:20px;padding:6px 13px;font-size:12px;font-weight:600;border:2px solid;white-space:nowrap;text-align:center;line-height:1.4;box-shadow:0 2px 12px rgba(0,0,0,.5)}

/* node types */
.n-you .nbody{background:#0d2818;border-color:#22c55e;color:#86efac}
.n-dlz .nbody{background:#2d1a02;border-color:#f59e0b;color:#fcd34d;font-size:13px;padding:8px 16px}
.n-concept .nbody{background:#1a0a2e;border-color:#a78bfa;color:#ddd6fe}
.n-phil .nbody{background:#0a1a2e;border-color:#60a5fa;color:#bfdbfe}
.n-oppose .nbody{background:#2e0a0a;border-color:#f87171;color:#fecaca}
.n-bridge .nbody{background:#0a1e1a;border-color:#34d399;color:#a7f3d0}

/* center node special */
.n-center .nbody{background:#1c1000;border-color:#f59e0b;color:#fcd34d;font-size:15px;font-weight:700;padding:12px 22px;border-width:3px;box-shadow:0 0 30px rgba(245,158,11,.3)}

/* panel */
.panel{position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;border-top:2px solid #333;padding:16px;transform:translateY(100%);transition:transform .3s;z-index:200;max-height:45vh;overflow-y:auto}
.panel.open{transform:translateY(0)}
.panel-inner{max-width:700px;margin:0 auto}
.panel-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.panel-name{font-size:16px;font-weight:700;color:#f0f0f0}
.panel-type{font-size:11px;padding:2px 8px;border-radius:10px;margin-top:3px}
.close-btn{background:none;border:none;color:#666;font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
.panel-body{font-size:13px;color:#aaa;line-height:1.8}
.panel-section{margin-top:12px}
.panel-slabel{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.conn-list{display:flex;flex-wrap:wrap;gap:5px}
.conn-tag{font-size:11px;padding:3px 9px;border-radius:10px;background:#2a2a2a;color:#aaa;border:1px solid #333;cursor:pointer}
.conn-tag:hover{border-color:#666;color:#ddd}
.you-conn{border-color:#22c55e;color:#86efac;background:#0d2818}
.dlz-conn{border-color:#f59e0b;color:#fcd34d;background:#2d1a02}
.phil-conn{border-color:#60a5fa;color:#bfdbfe;background:#0a1a2e}
.concept-conn{border-color:#a78bfa;color:#ddd6fe;background:#1a0a2e}

/* filter bar */
.filters{display:flex;gap:6px;padding:10px 16px;background:#141414;border-bottom:1px solid #222;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fbtn{flex-shrink:0;padding:5px 12px;border-radius:16px;border:1.5px solid #333;background:#1a1a1a;color:#888;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:#555;color:#ccc}
.fbtn.on{color:#111}
.fbtn-you.on{background:#22c55e;border-color:#22c55e}
.fbtn-dlz.on{background:#f59e0b;border-color:#f59e0b}
.fbtn-phil.on{background:#60a5fa;border-color:#60a5fa}
.fbtn-oppose.on{background:#f87171;border-color:#f87171}
.fbtn-concept.on{background:#a78bfa;border-color:#a78bfa}
.fbtn-bridge.on{background:#34d399;border-color:#34d399}
</style>
</head>

<div class="map-wrap">

const mapW = 900, mapH = 780;
document.getElementById('map').style.width = mapW+'px';
document.getElementById('map').style.height = mapH+'px';

// SVG lines
function drawEdges(filter=null){
  const svg = document.getElementById('svg-layer');
  svg.innerHTML = '';
  svg.setAttribute('viewBox',`0 0 ${mapW} ${mapH}`);
  EDGES.forEach(([a,b,col,op])=>{
    const na = NODES[a], nb = NODES[b];
    if(!na||!nb) return;
    if(filter){
      const catA = NODES[a]?.cat, catB = NODES[b]?.cat;
      if(!filter.has(catA)&&!filter.has(catB)) return;
    }
    const x1=na.x/100*mapW, y1=na.y/100*mapH;
    const x2=nb.x/100*mapW, y2=nb.y/100*mapH;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1);line.setAttribute('y1',y1);
    line.setAttribute('x2',x2);line.setAttribute('y2',y2);
    line.setAttribute('stroke',col);
    line.setAttribute('stroke-opacity',op);
    line.setAttribute('stroke-width','1.2');
    svg.appendChild(line);
  });
}

// Create nodes
const mapEl = document.getElementById('map');
Object.entries(NODES).forEach(([id,n])=>{
  const div = document.createElement('div');
  div.className = `node ${n.type}`;
  div.id = 'nd_'+id;
  div.dataset.id = id;
  div.dataset.cat = n.cat;
  div.style.left = n.x+'%';
  div.style.top = n.y+'%';
  div.innerHTML = `<div class="nbody">${n.label}</div>`;
  div.addEventListener('click',()=>openPanel(id));
  mapEl.appendChild(div);
});

drawEdges();

// Panel
function openPanel(id){
  const n = NODES[id];
  if(!n) return;
  document.querySelectorAll('.node').forEach(el=>el.classList.remove('active'));
  document.getElementById('nd_'+id)?.classList.add('active');

  const typeColors = {you:'#22c55e',dlz:'#f59e0b',phil:'#60a5fa',oppose:'#f87171',concept:'#a78bfa',bridge:'#34d399'};
  const col = typeColors[n.cat]||'#888';
  document.getElementById('p-name').textContent = n.label;
  const pt = document.getElementById('p-type');
  pt.textContent = n.typelabel||'';
  pt.style.background = col+'22';
  pt.style.color = col;
  pt.style.border = `1px solid ${col}44`;
  document.getElementById('p-body').innerHTML = n.body;

  const connEl = document.getElementById('p-conn');
  connEl.innerHTML = '';
  if(n.conn&&n.conn.length){
    document.getElementById('p-conn-wrap').style.display='block';
    n.conn.forEach(cname=>{
      const cid = Object.entries(NODES).find(([k,v])=>v.label===cname)?.[0];
      const tag = document.createElement('span');
      tag.className = 'conn-tag';
      tag.textContent = cname;
      if(cid){
        const ccat = NODES[cid].cat;
        const cls = {you:'you-conn',dlz:'dlz-conn',phil:'phil-conn',concept:'concept-conn',bridge:'concept-conn'}[ccat]||'';
        if(cls) tag.classList.add(cls);
        tag.onclick = ()=>openPanel(cid);
      }
      connEl.appendChild(tag);
    });
  } else {
    document.getElementById('p-conn-wrap').style.display='none';
  }

  document.getElementById('panel').classList.add('open');
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('.node').forEach(el=>el.classList.remove('active'));
}

// Filters
const activeFilters = new Set(['you','dlz','phil','oppose','concept','bridge']);
function toggleFilter(cat, btn){
  if(activeFilters.has(cat)){
    if(activeFilters.size===1) return;
    activeFilters.delete(cat);
    btn.classList.remove('on');
  } else {
    activeFilters.add(cat);
    btn.classList.add('on');
  }
  document.querySelectorAll('.node').forEach(el=>{
    const c = el.dataset.cat;
    el.style.opacity = activeFilters.has(c)?'1':'0.08';
    el.style.pointerEvents = activeFilters.has(c)?'auto':'none';
  });
  drawEdges(activeFilters);
}
</script>
</body>
