const VOLS = {
1: {
  cls:'v1', title:'哲学の誕生', sub:'古代ギリシャ①', period:'BC 600頃 – BC 300頃', depth:28,
  depthLabel:'流し読みでOK——ただしプラトンだけは理解しておく',
  tide:`哲学は「神話（ミュトス）」から「ロゴス（理性的言語）」への転換として始まりました。それまで「嵐が来るのはポセイドンが怒っているから」と説明していた世界を、「それは自然現象として説明できるはずだ」という態度で問い直した人々が最初の哲学者たちです。

この転換は、哲学史において何度も繰り返される問いを最初に提起しました。「世界の本当の姿（実在）とは何か」「私たちの認識はそれを正確に捉えられるか」——この二つです。

最初の衝突は、ヘラクレイトスとパルメニデスのあいだで起きます。ヘラクレイトスは「万物は流転する、同じ川には二度と入れない」と言い、変化こそが実在だと主張します。パルメニデスは逆に「真の存在は変化しない、変化するように見えるのは感覚の幻想だ」と言います。この「変化vs不変」「差異vs同一」という対立は、驚くほどそのままドゥルーズとヘーゲルの対立に重なります。

プラトンはこの問いに対して、「見えている世界（現象界）の背後に、真の実在（イデア界）がある」という答えを出します。椅子という概念のイデアがあり、目の前の木の椅子はそのコピーに過ぎない、と。これが「二元論」の始まりです。`,
  persons:[
    {name:'プラトン', dates:'BC 427–347', color:'#AFA9EC', body:`ソクラテスの弟子であり、西洋哲学の祖と言えます。彼が作り上げた「イデア論」は、その後2000年以上にわたって哲学の基本的な枠組みであり続けました。

イデア論の核心は「二世界論」です。私たちが見たり触れたりできる「現象界」と、理性だけで認識できる「イデア界」という二つの世界があり、イデア界こそが真の実在だとプラトンは言います。「美しいものは色々あるが、美しさそのもの（美のイデア）は一つだ」——これがイデア論の直感です。

また、プラトンは「オリジナル（イデア）、コピー（現象）、コピーのコピー（シミュラークル）」という階層を作り、シミュラークルを最も価値の低いものとして排除しました。この「シミュラークルの追放」がドゥルーズの最初の攻撃目標になります。`, keys:['イデア論','二世界論','洞窟の比喩','哲学者王']},
    {name:'アリストテレス', dates:'BC 384–322', color:'#AFA9EC', body:`プラトンの弟子でありながら、師のイデア論を否定した人。「形相（エイドス）は個物の中にある」というアリストテレスの主張は、プラトンが別の世界に置いたイデアを、この世界の中に引き戻す試みです。

論理学（三段論法）、形而上学（存在論）、倫理学（ニコマコス倫理学）、生物学、政治学——ほぼすべての学問領域を体系化し、西洋思想の「標準的な枠組み」を作りました。中世スコラ哲学では「哲学者」と言えばアリストテレスを指すほどです。

ドゥルーズとの直接の関係は薄いですが、アリストテレスが確立した「同一性・類似・対立・矛盾」という概念の枠組みが、ドゥルーズの批判する「表象の哲学」の基礎になっています。`, keys:['形而上学','三段論法','四原因説','ポリス的動物']},
    {name:'ヘラクレイトス', dates:'BC 535–475頃', color:'#9FE1CB', body:`断片しか残っていない謎めいた哲学者。「同じ川には二度と入れない」「万物は一つのロゴスに従って流転する」「対立するものは調和する」——これらの断片から、変化・差異・対立の哲学が読み取れます。

ドゥルーズはヘラクレイトスを「差異の哲学」の最初の代表者として高く評価します。プラトンが「変化は幻想だ、不変のイデアこそが真実だ」と言ったのに対し、ヘラクレイトスは「流れること、差異こそが実在だ」と言っていた——ドゥルーズはこのヘラクレイトス的な直感を、哲学史の「地下の流れ」として掘り起こします。`, keys:['万物流転','ロゴス','差異と変化','対立の調和']},
  ],
  dlz:`「プラトンを逆転させること（renverser le platonisme）」——これがドゥルーズ哲学の最初の宣言です。

プラトンはオリジナル（イデア）とコピー（現象）という階層を作り、シミュラークル（コピーのコピー）を最下層に排除しました。ドゥルーズはこれを逆転させます。「シミュラークルこそが一次的なものだ。オリジナルと見なされてきたイデアこそ、後から作られた幻想に過ぎない」——これが『差異と反復』の核心的な主張の一つです。

また、ヘラクレイトスとパルメニデスの対立は、そのままドゥルーズとヘーゲルの対立に重なります。ヘーゲルは差異を「矛盾として否定的に処理し、より高次の同一性へ統合する」——これはパルメニデス的な「同一性への回収」です。ドゥルーズは「差異は否定ではない、それ自体で肯定的な力だ」と言う——これはヘラクレイトス的な立場の現代版です。

1巻を読む際は、「プラトンが何を言ったか」を理解することを最優先にしてください。ドゥルーズの哲学は「プラトンへの応答」として書かれているからです。`,
},
2: {
  cls:'v2', title:'帝国と賢者', sub:'古代ギリシャ②・ローマ', period:'BC 300頃 – AD 500頃', depth:22,
  depthLabel:'ざっと流す——ストア派だけ少し丁寧に',
  tide:`アレクサンドロス大王の遠征（BC 334–323）によって、ギリシャ哲学は地中海世界全体に広がります。都市国家（ポリス）が崩壊し、個人が巨大な帝国の中で孤立する時代——哲学の関心は「世界の本質とは何か」という理論的問いから、「どうすれば幸福に生きられるか」という実践的問いへと移ります。

この時代の三大学派、ストア派・エピクロス派・懐疑派は、それぞれ異なる答えを出しました。ストア派は「自然（ロゴス）に従い、感情を理性でコントロールせよ」と言い、エピクロス派は「欲望を減らし、友人と穏やかに生きよ」と言い、懐疑派は「どんな判断も保留せよ（エポケー）、そうすれば心の平静（アタラクシア）が得られる」と言いました。

ローマ時代には、ストア哲学が実践倫理として広まり、マルクス・アウレリウスのような皇帝哲学者が生まれます。そしてプロティノスの新プラトン主義が中世キリスト教哲学への橋渡しになります。`,
  persons:[
    {name:'エピクロス', dates:'BC 341–270', color:'#9FE1CB', body:`「快楽こそが善だ」——この一文だけが伝わり、エピクロスは「快楽主義者」と誤解されることが多いです。しかし彼が言った快楽（ヘードネー）は、官能的な快楽ではなく「苦痛のない状態（アポニア）」と「心の平静（アタラクシア）」のことです。

エピクロスの処方箋は「欲望を減らすこと」。必要な欲望（食事・水）だけを満たし、不必要な欲望（富・名誉）を切り捨てる。「鶏小屋の庭で友人と過ごす生活」が彼の理想でした。

死への恐怖についての有名な言葉があります。「死は私たちにとって何でもない。なぜなら、私たちが存在するとき死はなく、死があるとき私たちは存在しないからだ」。これは合理的に正しいかもしれないが、人間はこれで安心できるのか——この問いはドゥルーズまで続きます。`, keys:['快楽主義（の誤解）','アタラクシア','原子論','友愛']},
    {name:'ストア派（ゼノン・セネカ・マルクス・アウレリウス）', dates:'BC 300 – AD 180', color:'#AFA9EC', body:`ストア哲学は「ロゴス（理性・自然の法則）に従って生きよ」という立場です。世界はロゴスという合理的原理によって支配されており、人間もその一部として生きている——であれば、感情に振り回されず、理性的に自分の役割を果たすことが徳（善）だ、と。

ストア派の最も重要な区別は「私たちの力の及ぶこと」と「及ばないこと」の区別です。天気、他人の反応、自分の死——これらは力が及ばない。及ぶのは自分の判断と意志だけ。力の及ばないことへの欲望を捨て、力の及ぶことに集中する——これがストア的な生き方です。

ドゥルーズとの繋がりで重要なのは「出来事（エヴェネマン）」の概念です。ストア派は世界を「物体（原因）」と「出来事（結果）」に分け、「出来事は物体の表面に生じる非物体的なもの」と考えました。ドゥルーズの『意味の論理学』はこのストア的な出来事論を現代に蘇らせます。`, keys:['ロゴス','出来事の哲学','アパテイア','自然に従う']},
    {name:'プロティノス', dates:'AD 204–270', color:'#CECBF6', body:`新プラトン主義の創始者。プラトンのイデア論を「一者（ト・ヘン）」という究極の原理から世界が流出（エマナチオ）するという神秘主義的な体系へと発展させました。

「一者→知性（ヌース）→魂（プシュケー）→物質」という流出の階層があり、哲学とは精神がこの流出を逆に辿り、一者と合一（エクスタシス）することだと言います。

直接ドゥルーズとは結びつきにくいですが、「すべては一つの原理の表現だ」という一元論的な発想は、スピノザを経由してドゥルーズに流れ込みます。また、プロティノスの「魂の下降と上昇」というイメージは、ドゥルーズ＝ガタリの「脱領土化と再領土化」という概念と構造的に似ています。`, keys:['一者','流出説','神秘的合一','新プラトン主義']},
  ],
  dlz:`この巻でドゥルーズに最も直接つながるのはストア派です。

ドゥルーズの主著の一つ『意味の論理学』（1969）は、ストア派の「出来事」概念を核心に置いています。ストア派は「切る」という動詞が表す「切断という出来事」を、ナイフや木という物体とは異なる次元に位置する非物体的なものとして分析しました。

ドゥルーズはこれを「意味は命題にも事物にも属さない第三の次元だ」という主張へと発展させます。そしてさらに重要なことは、ストア派の倫理——「起きたことをそのまま意志すること、amor fati（運命愛）」——をニーチェ経由で受け継ぐことです。「逃走」とは逃げることではなく、「起きたことを肯定しながら別の方向に向かうこと」——あなたの文章のテーマと深くつながっています。`,
},
3: {
  cls:'v3', title:'神との対話', sub:'中世哲学', period:'500 – 1400', depth:22,
  depthLabel:'ざっと流す——ただしスコトゥスの名前だけ記憶しておく',
  tide:`「暗黒の中世」という呼び方は誤解です。中世の哲学者たちは、キリスト教という制約の中で、非常に精緻な思考を展開しました。主たる問いは「理性と信仰はどう関係するか」「神の存在は証明できるか」「普遍的な概念（例えば「人間」という概念）は実在するか、それとも言葉に過ぎないか」——これらです。

特に最後の「普遍論争」は哲学史において重要です。「人間」という普遍的な概念は、個々の人間（ソクラテス、プラトン……）とは別に実在するのか（実念論）、それとも個々の人間だけが実在し、「人間」という概念は名前に過ぎないのか（唯名論）——この論争は、「一般と個別のどちらが先か」という問いであり、ドゥルーズの「個体性の哲学」につながります。

イスラームの哲学者たち（アヴィケンナ＝イブン・シーナー、アヴェロエス＝イブン・ルシュド）がアリストテレスの著作を保存・翻訳し、12世紀ルネサンスを通じてヨーロッパに伝えた——この歴史的な事実も押さえておくと良いでしょう。`,
  persons:[
    {name:'アウグスティヌス', dates:'354–430', color:'#9FE1CB', body:`かつて放蕩な生活を送り、マニ教、新プラトン主義を経てキリスト教に回心した人。その経験が『告白』という西洋最初の自伝的哲学書を生みました。

「私たちの心はあなた（神）の中に安らうまで、安らうことがない」——この一文に彼の哲学の核心があります。人間は神への愛によって内側から突き動かされており、その根源的な動力こそが時間論・記憶論・意志論の基礎になります。

アウグスティヌスの時間論——「過去は記憶として、未来は予期として、現在のみが実在する」——はのちにフッサール、ベルクソン、ドゥルーズの時間論へとつながっていきます。「過去・現在・未来の三重の現在」という発想です。`, keys:['時間論','記憶','恩寵','原罪']},
    {name:'トマス・アクィナス', dates:'1225–1274', color:'#9FE1CB', body:`「理性と信仰の統合」を目指したスコラ哲学の頂点。アリストテレスの哲学をキリスト教神学に接続した『神学大全』は、中世哲学の集大成です。

「神の存在証明（五つの道）」が有名ですが、より重要なのはトマスが「理性は信仰を否定しない、理性でも神の存在と本質の一部は証明できる」と主張した点です。これは「哲学（理性）と神学（信仰）は矛盾しない」という立場であり、当時は革命的でした。

ドゥルーズへの直接の影響は薄いですが、トマスが打ち立てた「類比（アナロジー）」——神と人間の存在は「類比的」に同じ「ある」と言える——という概念が、スコトゥスの「一義性」批判の起点になります。`, keys:['神学大全','存在証明','理性と信仰','アリストテレス受容']},
    {name:'ドゥンス・スコトゥス', dates:'1266–1308', color:'#CECBF6', body:`哲学史の中では比較的マイナーですが、ドゥルーズへの影響という点では最重要人物の一人です。

スコトゥスが提唱した「存在の一義性（univocité de l'être）」は革命的な概念です。トマス・アクィナスは「神の存在と人間の存在は類比的に（アナロジカルに）同じ意味で『ある』と言える」と主張しました。しかしスコトゥスは「いや、神も人間も草も石も、あらゆるものが同一の意味で『ある』と言える」と言います。

これは何を意味するか。神が特別扱いされないということです。存在に階層がない。すべての存在は同じ平面の上にある——これがドゥルーズの「内在性の平面（plan d'immanence）」の哲学的な先祖です。ドゥルーズは『差異と反復』の中でスコトゥスを「存在の一義性の最初の表明者」として高く評価しています。`, keys:['存在の一義性','内在性の先駆','個体化原理（ハエセイタス）']},
    {name:'オッカム', dates:'1287–1347頃', color:'#9FE1CB', body:`「オッカムの剃刀」で有名な唯名論者。「存在は必要以上に増やされてはならない」——プラトンのイデア、トマスの神の本質など、「見えない実体」を理性で想定することへの強烈な批判です。

「人間というイデアは実在しない、ソクラテスという個体だけが実在する」——この唯名論的な立場は、「個体性を普遍性より優先する」という発想であり、ドゥルーズの哲学と通底しています。オッカムから始まる唯名論の流れが、ヒュームの経験論へ、そしてドゥルーズの「個体性の哲学」へとつながっていきます。`, keys:['オッカムの剃刀','唯名論','個体優先','近代への橋渡し']},
  ],
  dlz:`中世哲学とドゥルーズの繋がりは、一見薄く見えますが、実は「存在の一義性」という概念を通じて非常に深いです。

ドゥルーズは『差異と反復』第2章「差異そのもの」の中で、「存在の一義性」の系譜をスコトゥス→スピノザ→ニーチェと辿ります。「すべての存在が同じ声で（une seule et même voix）語られる」——この一義性の思想こそが、超越的な審級（神、イデア、真理）を廃して、すべてを内在的な平面に置くドゥルーズ哲学の基礎です。

また、オッカムの唯名論から始まる「個体性の優先」は、ヒューム（6巻）を経てドゥルーズの「差異は一般性に先立つ」という命題へと流れ込みます。3巻は流し読みで十分ですが、スコトゥスとオッカムの名前と概念だけはメモしておくことをお勧めします。`,
},
4: {
  cls:'v4', title:'ルネサンス——世界と人間の再発見', sub:'15–16世紀', period:'1400 – 1600', depth:32,
  depthLabel:'潮流をつかむ——モンテーニュとブルーノは丁寧に',
  tide:`「ルネサンス（再生）」とは、古代ギリシャ・ローマの文化の再発見です。しかしそれは単なる古典への回帰ではありませんでした。「人間は自分の力で世界を理解し、変えることができる」という根本的な態度の転換が起きました。

この時代を理解するための三つのキーワードは「人文主義（フマニズム）」「自然哲学」「宗教改革」です。

人文主義は、神学中心だった学問を人間中心へと転換します。ペトラルカ、エラスムス、モンテーニュたちは、ラテン語の古典を読み直し、人間の感情・理性・身体を肯定的に語り始めます。自然哲学は、宇宙を「神の作品」としてではなく、数学的・機械論的に理解しようとします。ガリレオ「自然という書物は数学の言語で書かれている」——この発言が近代科学の始まりです。宗教改革は、カトリック教会という権威への反抗であり、「個人が聖書を直接読む」という個人主義の萌芽です。

哲学史的に最も重要な転換は「疑い」の復活です。古代の懐疑論が再発見され、モンテーニュが「私は何を知るか？」と問います。この疑いがデカルトの「方法的懐疑」へとつながります。`,
  persons:[
    {name:'モンテーニュ', dates:'1533–1592', color:'#F0997B', body:`「随筆（エッセイ）」というジャンルを発明した人。著作『エセー（随筆録）』は哲学書でも文学書でもなく、「私は何を知るか？」という問いを、自分自身を観察することで探求した三巻本です。

「我が書物の材料は私自身だ」——モンテーニュは人間一般を語るのではなく、「泉という個人の観察」を哲学の出発点にします。これは「普遍的な真理」を語る中世哲学から、「個人的な経験」を語る近代哲学への転換点です。

あなたの文章とモンテーニュを比べると、驚くほど構造が似ています。「個人的事象から出発し、そこから普遍的な問いへ」という身振り。「自分を観察する」という方法。「断片的なメモと思索の混在」という形式——モンテーニュは16世紀にあなたの文章と同じことをしていました。`, keys:['随筆（エッセイ）の発明','自己観察','懐疑主義','クセジュ（私は何を知るか）']},
    {name:'ジョルダーノ・ブルーノ', dates:'1548–1600', color:'#F0997B', body:`宇宙は無限であり、太陽も無数の星の一つに過ぎない——この「無限宇宙論」を唱え、宗教裁判で火刑に処された人。

ブルーノの哲学の核心は「神は宇宙の外にいる超越的な存在ではなく、宇宙そのものに内在している」という汎神論（パンテイズム）です。「一者（神）は万物の中にある、万物は一者の表現だ」——これはプロティノスとスピノザをつなぐ発想です。

ドゥルーズへの影響は間接的ですが、「超越的な神」を否定し「内在する神（＝自然）」を肯定するブルーノの汎神論は、スピノザの「神すなわち自然（Deus sive Natura）」へ、そしてドゥルーズの「内在性の平面」へとつながっていきます。「火刑に処されてでも超越性を否定した人」として、この名前は覚えておく価値があります。`, keys:['無限宇宙論','汎神論','内在性の先駆','コペルニクス的転換の哲学版']},
    {name:'マキアヴェッリ', dates:'1469–1527', color:'#F0997B', body:`「目的のためには手段を選ばない」——この言葉で誤解されることが多いですが、マキアヴェッリは「政治から道徳を切り離して考えること」を初めて明示的に行った思想家です。

『君主論』は、キリスト教的道徳ではなく「権力の現実」を分析した書物です。「人間は善良ではない、だから政治は現実主義的でなければならない」——この冷徹な観察は、哲学を「あるべき姿」から「あるがままの姿」へと向け直しました。

ドゥルーズ＝ガタリの政治哲学は、この「権力の現実主義的分析」を継承しています。『千のプラトー』における権力論・国家論はマキアヴェッリ的な現実主義に立脚しています。`, keys:['政治的現実主義','君主論','ヴィルトゥ','運命（フォルトゥーナ）']},
    {name:'エラスムス', dates:'1466–1536', color:'#F5C4B3', body:`「人文主義の王子」と呼ばれたオランダの学者。ルターと同時代に生きながら、宗教改革には参加しなかった——「中道の人」として知られます。

『愚神礼賛』では、愚かさを礼賛する逆説的な語り口で、当時の教会・貴族・学者の欺瞞を鋭く批判します。「愚かさこそが人間を生きさせる」という逆説は、「意味ではなく非意味こそが生を豊かにする」というあなたの文章のテーマと通底しています。`, keys:['人文主義','愚神礼賛','中道','古典文献批判']},
  ],
  dlz:`4巻でドゥルーズへの最も重要な繋がりは二つあります。

一つはブルーノの汎神論から始まる「内在性」の系譜です。超越的な神（上から世界を支配する力）を否定し、すべてが内在する一つの平面にある——ブルーノ→スピノザ→ドゥルーズという「内在性の地下水脈」がここから始まります。

もう一つはモンテーニュの「個人的事象から哲学を始める」という態度です。ドゥルーズは哲学を「概念の創造」と定義しましたが、その概念は必ず「個人的な問題（プロブレーム）」から生まれます。抽象的な問いではなく、生きることの具体的な問題から——この態度はモンテーニュ以来の伝統です。

あなたの文章は「躁鬱という個人的な経験」から哲学的な概念（構造・カオス・逃走）を作ろうとしています。それはまったくルネサンス的、モンテーニュ的な身振りです。`,
},
5: {
  cls:'v5', title:'デカルト革命——神・人間・自然', sub:'17世紀', period:'1600 – 1700', depth:88,
  depthLabel:'★重点的に読む——スピノザは必読',
  tide:`17世紀は近代哲学の出発点です。「確実な知識の基礎をどこに置くか」という問いをめぐり、大陸合理論（デカルト・スピノザ・ライプニッツ）とイギリス経験論（ロック・バークリー・ヒューム、次巻）が展開します。

デカルトの革命は「哲学の出発点を神から考える主体（私）へ移した」ことです。「すべてを疑え、しかし疑っている私は疑えない——cogito ergo sum（我思う、ゆえに我あり）」——この一文が近代哲学の礎石になります。

しかし注目すべきは、デカルトへの反応です。デカルトは「考える私（精神）」と「延長する物体（身体・自然）」を全く別の実体として分け、心身二元論を打ち立てました。スピノザはこれを正面から否定します——「精神と物体は一つの実体（神＝自然）の二つの属性に過ぎない」。この一元論こそがドゥルーズ哲学の核心に直結します。`,
  persons:[
    {name:'デカルト', dates:'1596–1650', color:'#85B7EB', body:`近代哲学の祖。「確実な知識を見つけるために、まずすべてを疑おう」という「方法的懐疑」から出発し、「疑っている私は疑えない」というコギトに辿り着きます。

デカルトの哲学を支える三つの主張は、「実体の二元論（精神と物体）」「機械論的自然観（自然は神が作った機械）」「真理の明晰判明な認識（疑えないほど明らかなものだけを真理とする）」です。

ドゥルーズはデカルトの「コギト（主体としての私）」を批判します。「考えることの条件（超越論的な場）を問わずに、考える主体を前提にしている」——カントからの批判を受け継いだ上で、「主体よりも前に、生成・差異のプロセスがある」と主張するのがドゥルーズの立場です。`, keys:['コギト','心身二元論','方法的懐疑','機械論的自然観']},
    {name:'スピノザ', dates:'1632–1677', color:'#378ADD', body:`ドゥルーズが「哲学の王子」と呼び、「私の本の中で最も好きな本はスピノザについての本だ」と言った人物。ユダヤ教コミュニティから破門され、デカルトの心身二元論を批判し、「神すなわち自然（Deus sive Natura）」という一元論を打ち立てました。

主著『エチカ（倫理学）』は幾何学的方法（定義・公理・命題・証明）で書かれています。その内容は：すべては「一つの実体（神＝自然）」の表れであり、精神（思惟）と身体（延長）はその実体の二つの属性に過ぎない。人間の「自由」とは、感情（受動的な情動）に支配されることなく、能動的に自分の本性に従って生きることだ。

スピノザの倫理学のキーワードは「コナトゥス（conatus）」——「自己の存在を維持・強化しようとする努力」です。これは「力への意志」（ニーチェ）、「欲望（désir）」（ドゥルーズ）への直接の先祖です。

また「悲しみと喜び」の区別——「私の力を増大させる情動（喜び）」と「減少させる情動（悲しみ）」——はドゥルーズの「強度（intensité）」の概念に直結します。あなたの文章で言えば、「窒息する感覚」は力を減少させる悲しみの情動であり、「江ノ島の電車で解放される感覚」は力を増大させる喜びの情動です。`, keys:['神すなわち自然','一元論（一実体論）','コナトゥス','情動論','内在性の哲学']},
    {name:'ライプニッツ', dates:'1646–1716', color:'#85B7EB', body:`微分積分の発明者（ニュートンと独立に）であり、論理学の先駆者でもある哲学者。哲学の概念としては「モナド（単子）論」が最も有名です。

「モナド」は窓のない精神的な単子であり、世界はこれらのモナドの集合体です。すべてのモナドは「宇宙全体を自分の視点から映し出している鏡」であり、神がこれらのモナドを「予定調和」によって調整しているという奇妙な体系です。

ドゥルーズはライプニッツについて晩年の著作『襞——ライプニッツとバロック』（1988）を書いています。「世界は無限の折り畳み（プリ、pli）からなる」というライプニッツのビジョンを、バロック芸術（折りたたまれた布）と結びつけ、「差異は統一される前に無限の微分として存在する」という発想を引き出します。`, keys:['モナド論','予定調和','微分','バロック','襞（pli）']},
  ],
  dlz:`5巻はドゥルーズ哲学の「地下の源泉」を知るための最重要巻の一つです。

スピノザの「存在の一義性」（スコトゥスから来る）、「神すなわち自然」という内在性の哲学、「コナトゥス」という欲望の概念、「情動の倫理学」——これらすべてがドゥルーズの哲学に直接流れ込んでいます。

特に重要なのは「内在性」という概念です。スピノザは「神は世界の外にいる超越的な存在ではなく、世界そのものに内在している」と言いました。ドゥルーズの「内在性の平面」はこれを継承し、「哲学はいつでも超越性の誘惑と戦わなければならない」と言います。

ライプニッツの「襞（pli）」の概念も重要です。「差異は折りたたまれて潜在的に存在している」——この発想が『差異と反復』の核心にあります。

この巻のスピノザの章は、哲学の歴史シリーズ全体の中で最も重要な章の一つです。時間をかけて読んでください。`,
},
6: {
  cls:'v6', title:'知識・経験・啓蒙', sub:'18世紀前半', period:'1700 – 1780', depth:72,
  depthLabel:'★ヒュームの章は必読',
  tide:`17世紀大陸の合理論が「理性で世界の真理に辿り着ける」と主張したのに対し、イギリス経験論は「知識の起源は経験だ」と反論します。この対立は単なる哲学者の論争ではなく、「人間は何者か」という問いへの二つの答えです。

ロックは「生まれたとき心は白紙（タブラ・ラサ）だ、知識は経験によってのみ書き込まれる」と言います。バークリーは「存在するとは知覚されることだ（esse est percipi）」と言い、物質の実在を否定します。そしてヒュームが経験論を極限まで推し進め、「因果関係も、自己（私）も、必然性も——実はすべて習慣と連合に過ぎない」という衝撃的な結論に辿り着きます。

啓蒙主義（モンテスキュー、ヴォルテール、ルソー、ディドロ）は、理性の光で宗教的権威・封建的制度・無知・迷信を打ち破ろうとした文化運動です。「百科全書（アンシクロペディ）」はその集大成——すべての知識を理性的に整理し公開することで、世界を変えようとしました。`,
  persons:[
    {name:'ロック', dates:'1632–1704', color:'#97C459', body:`「生まれたとき心は白紙（タブラ・ラサ）だ」——すべての知識は経験から来るというロックの経験論は、デカルトの生得観念（生まれながらの観念）を否定します。

政治哲学においても重要で、「人間は生まれながら自由・平等であり、生命・自由・財産という自然権を持つ。政府はこれを保護するために人々が契約で作ったものだ」——この社会契約論はアメリカ独立宣言に直接影響を与えました。

ドゥルーズとの関係では、ロックの経験論が「知識は経験の積み重ねから構成される」という「構成主義」的な発想を開いたことが重要です。「主体は先に与えられるのではなく、経験の中で構成される」——この発想がヒュームを経てドゥルーズに流れ込みます。`, keys:['タブラ・ラサ','経験論','社会契約論','自然権']},
    {name:'ヒューム', dates:'1711–1776', color:'#639922', body:`ドゥルーズの最初の著作（『経験論と主体性』1953）の主題。経験論を極限まで推し進め、常識的な前提を次々と破壊した「哲学的懐疑論」の最高峰です。

最も有名な問いは「因果関係」についてです。「火に近づくと熱い」——これはなぜか？「火が熱さを引き起こす」という因果関係は本当に存在するか？ヒュームは言います、「私たちは『火→熱さ』という継起を繰り返し経験し、それを習慣として心に刻んだ。因果関係は世界にあるのではなく、私たちの心の習慣的な期待だ」と。

さらに問います——「自己（私）とは何か？」。内省してみると、「私」という統一的な実体は見当たらない。あるのは「印象と観念の束（バンドル）」だけだ。「自己は習慣と連合の産物であり、固定した実体ではない」——この発想がドゥルーズの「主体は効果（エフェクト）に過ぎない」という主張の原型です。

また「理性は情念の奴隷だ」というヒュームの主張——理性だけでは行動できない、私たちを動かすのは情念（passion）だ——は、スピノザの情動論、ドゥルーズの欲望論と深く共鳴します。`, keys:['因果関係の批判','自己の束理論','習慣と連合','理性は情念の奴隷']},
    {name:'ルソー', dates:'1712–1778', color:'#97C459', body:`啓蒙主義の中にいながら啓蒙主義を批判した孤独な思想家。「自然に帰れ」という言葉は誤解されていますが、ルソーは原始の生活への回帰を勧めたのではなく、「文明が人間を腐敗させた、本来の人間性（自己愛・同情）を取り戻せ」と言ったのです。

社会契約論では「一般意志（volonté générale）」という概念を打ち出します——個人の利益の総和（全体意志）ではなく、共同体全体の真の善を目指す意志。この「一般意志」はのちにヘーゲルの「普遍」へ、さらにはファシズムの「民族の意志」へと悪用される危険を内包していました。

ドゥルーズとの関係では、ルソーの「文明批判」と「個人の感性・感情の擁護」という身振りを受け継いでいます。あなたの「社会的意味（窒息）」対「個人的非意味（カオス）」という対立図式は、ある意味でルソー的な問いの現代版です。`, keys:['自然状態','一般意志','文明批判','感性の哲学']},
  ],
  dlz:`この巻はドゥルーズの出発点を理解するための鍵です。

ドゥルーズが最初に書いたのはヒューム論でした。その問いは「主体はどのように構成されるか」です。ヒュームによれば、主体（私）は先に存在するのではなく、経験・習慣・連合の過程の中で構成される効果に過ぎません。

ドゥルーズはこのヒューム的な問いを受け継ぎながら、さらに進めます——「では主体を構成する習慣・連合・差異の過程そのものを、主体抜きで記述できないか？」。これが『差異と反復』の超越論的経験論への問いです。

また「理性は情念の奴隷だ」というヒュームの主張は、「欲望（désir）が思考の原動力だ」というドゥルーズ＝ガタリの命題の先祖です。思考は中立的な理性の産物ではなく、欲望・情動・強度の産物である——この発想がここから来ています。

あなたの文章との繋がりで言えば、「躁鬱の波」を「自己という固定した実体」ではなく「情動の束として変動する過程」として理解する視点——これはヒューム的な自己理解です。`,
},
7: {
  cls:'v7', title:'理性の劇場——カント・ヘーゲル', sub:'18世紀末〜19世紀初頭', period:'1780 – 1840', depth:93,
  depthLabel:'★★最重点。この巻だけはじっくり読む',
  tide:`哲学史の最大の山場です。カントとヘーゲルは、ドゥルーズにとって「乗り越えるべき親」であり、この二人を理解せずにドゥルーズは読めません。

カントの問題意識は「ヒュームによる覚醒」から来ています。ヒュームが「因果関係も自己も習慣に過ぎない」と言ったことで、科学的知識（ニュートン力学）の確実性が根拠を失いました。カントはこれに答えようとします——「科学的知識が可能なのはなぜか？」を問うことで。

カントの答え：「私たちが世界を認識するとき、空間・時間・因果関係などの「形式」を人間の側から持ち込んでいる。だから科学は可能だ。しかし同時に、物自体（世界そのもの）は認識できない」。これが「コペルニクス的転回」——認識が対象に従うのではなく、対象が認識の形式に従う。

ヘーゲルはカントの「物自体は認識できない」という限界を乗り越えようとします。「精神（Geist）は歴史の中で自己を展開し、最終的に絶対知に到達する」——弁証法（テーゼ→アンチテーゼ→ジンテーゼ）による自己実現の哲学。ドゥルーズの批判の核心は「ヘーゲルは差異を否定として処理し、同一性へと回収する」というところにあります。`,
  persons:[
    {name:'カント', dates:'1724–1804', color:'#EF9F27', body:`ケーニヒスベルク（現在のロシア領カリーニングラード）に生まれ、一度も故郷を離れなかったにもかかわらず、哲学史上最大の転換をもたらした人。三つの批判書——『純粋理性批判』（認識論）、『実践理性批判』（倫理学）、『判断力批判』（美学・目的論）——が主著です。

『純粋理性批判』の核心は「超越論的観念論」です。私たちが世界を経験できるのは、人間が「時間・空間（直観の形式）」と「カテゴリー（悟性の形式、因果関係など12個）」を先験的に持っているからだ。しかしこれらの形式は経験を整理するための枠組みであり、物自体（Ding an sich）——枠の外の世界そのもの——は認識できない。

ドゥルーズはカントを深く受け継ぎながらも批判します。受け継ぐのは「超越論的」という発想——経験を可能にする条件を問うこと。批判するのは「カントの超越論的な条件（時間・空間・カテゴリー）が、結局は人間の経験と同じ形（同一性）に基づいていること」。ドゥルーズは「差異そのものを超越論的条件とする超越論的経験論」を目指します。

ユクスキュルの「環世界」との繋がり：カントが「人間の認識形式が世界を構成する」と言ったことを、ユクスキュルは「種ごとに固有の環世界がある」と生物学的に展開しました。ドゥルーズはこれをさらに「環世界は固定されておらず、変えられる、作れる」と展開します。`, keys:['物自体','コペルニクス的転回','超越論的観念論','三批判書','カテゴリー']},
    {name:'ヘーゲル', dates:'1770–1831', color:'#BA7517', body:`19世紀最大の哲学体系を構築した人。主著は『精神現象学』『論理学』『法の哲学』。「弁証法」が最も有名な概念ですが、それは単純な「正反合」ではありません。

ヘーゲルの弁証法の核心は「否定の否定」です。何かが存在する（テーゼ）、しかしそれは自己矛盾を内包している（アンチテーゼ）、その矛盾がより高次の統一（ジンテーゼ）へと乗り越えられる（アウフヘーベン、止揚）——この運動が「絶対精神の自己展開」として歴史全体に働いている。

歴史の目的論：ヘーゲルにとって歴史は無意味な変化の連続ではなく、絶対精神が自由の実現に向かって進む目的論的プロセスです。「世界史は自由の意識の進歩だ」——ナポレオンを「馬に乗った世界精神」と呼んだほどです。

ドゥルーズにとってヘーゲルは最大の批判対象です。批判の核心は三点。①差異を「矛盾」として否定的に処理する——ドゥルーズ「差異は肯定的な力だ、矛盾に還元されない」。②すべてを「同一性」へと回収する——ドゥルーズ「差異は同一性に先立つ」。③歴史に「目的（テロス）」を置く——ドゥルーズ「生成は目的なく差異化し続ける」。`, keys:['弁証法','絶対精神','否定の否定','アウフヘーベン','歴史の目的論']},
    {name:'フィヒテ', dates:'1762–1814', color:'#FAC775', body:`カントとヘーゲルの間に位置するドイツ観念論の哲学者。「自我（イッヒ）が非我（ニヒト・イッヒ）を定立する」という「自我論」で有名です。

フィヒテはカントの「物自体（認識できない領域）」を廃棄し、「絶対的自我がすべての経験を産み出す」という絶対的観念論へと突き進みます。「主体こそがすべての根拠だ」——しかしこれはドゥルーズが批判する「主体の哲学」の最も純粋な形です。

後期の民族主義的演説（「ドイツ国民に告ぐ」）はナポレオン占領への抵抗として書かれましたが、のちのナショナリズムの源泉の一つになりました。`, keys:['絶対的自我','自我論','ドイツ観念論','民族主義への影響']},
    {name:'シェリング', dates:'1775–1854', color:'#FAC775', body:`ヘーゲルとの関係（友人から対立へ）でも有名な哲学者。「自然哲学」の創始者であり、「自然は可視化された精神だ」「精神は不可視の自然だ」という同一性の哲学を構築しました。

後期の「神話の哲学」「啓示の哲学」では、ヘーゲルの合理主義的体系に対し「存在の暗い根底（Ungrund）」——理性的に把握できない実存の深み——を提起します。この「暗い根底」はドゥルーズが『差異と反復』で展開する「潜在的なもの（virtuel）」の概念に先行する発想です。`, keys:['自然哲学','同一性哲学','暗い根底（Ungrund）','後期の実存論的転回']},
  ],
  dlz:`この巻はドゥルーズを理解するための最重要巻です。

カントとの関係：ドゥルーズはカントを深く尊重しながら批判します。カントは「経験を可能にする超越論的条件を問う」という発想を開きました——これをドゥルーズは受け継ぎます。しかし批判するのは「カントが超越論的条件として設定した時間・空間・カテゴリーが、結局は経験の形（同一性・類似性）を写したものに過ぎない」という点です。ドゥルーズの「超越論的経験論」は、同一性ではなく「差異そのもの」を条件として設定しようとします。

ヘーゲルとの関係：ドゥルーズの主著『差異と反復』は、ある意味でヘーゲルへの哲学的な宣戦布告として読めます。「差異は矛盾ではない」「生成は同一性への回収ではなく、差異の永遠回帰だ」「歴史に目的はない」——これらはすべてヘーゲルへの明示的な反論です。

あなたの文章との繋がり：躁鬱の波を「弁証法（対立→止揚→より高次の統一）」として理解しようとするとき、そこにはヘーゲル的な思考が潜んでいます。「いつかこの苦しみが意味を持つ、より高次の自分に向かっている」という思考。ドゥルーズ的に言えば、「波は止揚されない、ただ差異として繰り返される、そしてその繰り返しの中に生を見出す」——これが「差異と反復」という思想の倫理的な含意です。`,
},
8: {
  cls:'v8', title:'社会の哲学', sub:'18〜20世紀', period:'1750 – 1950', depth:28,
  depthLabel:'文脈として流す——マルクスの章だけ記憶',
  tide:`哲学が「社会」「歴史」「経済」に向かった時代。フランス革命（1789）、産業革命、資本主義の台頭——これらの現実的な出来事が哲学に新しい問いを突きつけます。「社会はどう組織されるべきか」「歴史はどこへ向かうか」「科学的方法で社会も研究できるか」——これらが中心問題です。

コント（実証主義）は「哲学も社会も科学的に研究できる」と言い、マルクスは「哲学者は世界を解釈してきたが、重要なのは変えることだ」と言い、プラグマティズム（パース・ジェイムズ・デューイ）は「真理とは役に立つものだ」と言います。

この巻の哲学者たちは、純粋な認識論や形而上学ではなく、「現実の社会をどう変えるか」という問いに哲学を向けました。これはある意味でヘーゲルの「哲学は時代の子だ」という命題の実践でもあります。`,
  persons:[
    {name:'マルクス', dates:'1818–1883', color:'#ED93B1', body:`「これまでの哲学者たちはさまざまな方法で世界を解釈してきた、しかし肝心なのは世界を変えることだ」（『フォイエルバッハに関するテーゼ』第11テーゼ）——この一文がマルクスの立場を凝縮しています。

マルクスはヘーゲルの弁証法を「観念（精神）から現実（物質）へ」ではなく「現実（物質・経済）から観念（意識・哲学）へ」と逆転させます（「ヘーゲルを逆さまに立てた」）。これが唯物史観（史的唯物論）です。

資本主義の分析（『資本論』）：「剰余価値（surplus value）」の概念——労働者の労働力を商品として買い、その労働から搾取することで資本家は利潤を得る。この分析は単なる経済学ではなく、「欲望と権力の構造」についての分析です。

ドゥルーズ＝ガタリの『アンチ・オイディプス』は「マルクス＋フロイト」の企図として書かれています。資本主義の分析にフロイトの無意識論・欲望論を接続し、「なぜ人々は自分を抑圧する権力を欲望するのか」という問いを立てます。`, keys:['唯物史観','剰余価値','疎外','革命の哲学']},
    {name:'プラグマティズム（パース・ジェイムズ・デューイ）', dates:'19世紀末〜20世紀', color:'#F4C0D1', body:`アメリカ生まれの哲学。「真理とは実際に役立つものだ（cash value）」というジェイムズの定式が有名ですが、それは単純な実用主義ではありません。

パースの「プラグマティシズム」は「概念の意味はその実践的な結果によって決まる」という認識論。デューイは「経験と自然」「民主主義と教育」において、知識と行為の統一を説きました。

ドゥルーズはアングロ・サクソンの経験論・プラグマティズムを高く評価します。「フランス哲学は超越性を愛し、イギリス・アメリカ哲学は内在性を生きる」——ヒューム、ホワイトヘッド、そしてプラグマティズムの「実験的・非体系的」な哲学への親近感をドゥルーズは表明しています。`, keys:['真理の実用主義','経験の哲学','民主主義','行為と知識の統一']},
  ],
  dlz:`この巻でドゥルーズへの最重要の繋がりはマルクスです。

ドゥルーズ＝ガタリの『アンチ・オイディプス』（1972）と『千のプラトー』（1980）は、資本主義に対する哲学的・政治的な分析として書かれています。「資本主義は欲望の流れを公理系として管理することで機能する」という分析は、マルクスの資本論なしには成立しません。

あなたの文章との接続：「強い社会的意味（第1象限）」として描かれる東京の仕事環境——これはある意味で「資本主義的な欲望管理」の問題です。「生産性・利益率・効率」によって個人の欲望が組み替えられる——ドゥルーズ＝ガタリはこれを「欲望の脱コード化と再コード化（再領土化）」として分析します。あなたが感じた「窒息」の構造的原因がここにあります。`,
},
9: {
  cls:'v9', title:'反哲学と世紀末', sub:'ニーチェ・フロイト・マルクス', period:'1840 – 1910', depth:82,
  depthLabel:'★ニーチェの章は必読',
  tide:`ヘーゲルの壮大な体系が崩れていく時代。「理性」「進歩」「歴史の目的」への信頼が根本から揺らぎます。マルクスは「哲学は現実を変えられていない」と言い、ニーチェは「真理とは便利な嘘だ、神は死んだ」と言い、フロイトは「人間は自分の動機を知らない、無意識がある」と言います。この三人はそれぞれ異なる方向から「理性的な主体」という近代の幻想を破壊しました。

ニーチェはこの巻で最も重要です。「神は死んだ」とはキリスト教の神だけでなく、「客観的真理」「道徳的絶対者」「歴史の目的」——あらゆる「彼岸にある価値の源泉」の崩壊を意味します。では何が残るか？「力への意志（Wille zur Macht）」と「永劫回帰（ewige Wiederkunft）」——このニーチェの応答がドゥルーズ哲学の核心へと直結します。`,
  persons:[
    {name:'ニーチェ', dates:'1844–1900', color:'#F09595', body:`哲学史の中で最も誤解されてきた人の一人。ナチスに利用された（姉のエリーザベトが改竄した）こと、「力への意志」が「権力への意志」として誤読されたこと——これらの誤解を解いたのがドゥルーズの『ニーチェと哲学』（1962）です。

「神は死んだ（Gott ist tot）」（『悦ばしき知識』）：これは神学的な宣言ではなく、「客観的な価値の根拠が崩壊した」という文化診断です。価値の根拠が消えたとき、二つの反応がある——ニヒリズム（何も価値がない）に沈むか、「力への意志」によって新しい価値を創造するか。

「永劫回帰（ewige Wiederkunft）」：「この人生を、このまま、無限に繰り返してもいいか？」——これはコスモロジー的な命題ではなく、倫理的な命題です。「今この瞬間を、永遠に繰り返したいと意志できるか」——これが生の肯定の最も厳しい試験です。

ドゥルーズによる永劫回帰の再解釈：ドゥルーズは「同じもの（同一性）が回帰するのではなく、差異が回帰する」と読みます。「毎回の繰り返しは前の繰り返しとは微妙に異なる」——差異の永遠回帰。これは「循環の中の無限の新しさ」という発想であり、ベルクソンの「持続」とも共鳴します。

「力への意志（Wille zur Macht）」：権力への欲望ではなく、「自己を超えていく力、強度を増大させる運動」です。スピノザの「コナトゥス（存在を維持・強化しようとする努力）」と深くつながっています。`, keys:['神は死んだ','永劫回帰','力への意志','超人','ニヒリズムの克服']},
    {name:'ショーペンハウアー', dates:'1788–1860', color:'#F7C1C1', body:`「世界の本質は盲目的な意志（Wille）だ」という悲観主義哲学。カントの「物自体」を「意志」として解釈し、「世界は意志の表象だ」という体系を構築しました。

ニーチェの出発点であり（後にニーチェが強く反発した）、フロイトの「リビドー（性的エネルギー）」概念にも影響を与えています。また、東洋哲学（仏教・ヒンドゥー哲学）をヨーロッパ哲学に初めて真剣に接続した人でもあります。

「意志の否定（苦行・芸術・解脱）」によってしか苦しみから救われない——この悲観主義をニーチェは「あらゆる生を肯定せよ」という方向に逆転させます。ドゥルーズ哲学の根底にある「肯定」の身振りは、このショーペンハウアー→ニーチェという「否定から肯定へ」の運動を背景にしています。`, keys:['意志と表象としての世界','悲観主義','苦行による救済','ニーチェへの影響']},
    {name:'フロイト', dates:'1856–1939', color:'#F09595', body:`「無意識」の発見者。「人間は自分の行動の動機を知らない、自我（意識）は自分の家の主人ではない」という主張が心理学・文化・哲学に与えた衝撃は計り知れません。

「エス（イド）・自我（エゴ）・超自我（スーパーエゴ）」という心の構造。エスは本能的欲動の貯蔵庫、自我は現実原則に従い欲動を調整する機能、超自我は社会的な禁止を内面化したもの。「文明は欲動の抑圧の上に成立している」——この分析は文明論でもあります。

ドゥルーズ＝ガタリはフロイトを激しく批判します。『アンチ・オイディプス』のタイトル通り、「欲望をオイディプス（父・母・子の三角形）に還元するな」という批判です。「欲望はオイディプス的な家族ドラマではなく、もっと広大な社会・政治・宇宙論的な流れだ」——これがドゥルーズ＝ガタリの欲望論の基本的な立場です。`, keys:['無意識','エスと自我と超自我','欲動','リビドー','文明と抑圧']},
  ],
  dlz:`この巻はドゥルーズ哲学の「感情的な核心」を理解するための鍵です。

ドゥルーズにとってニーチェは「肯定の哲学者」です。ヘーゲルが「否定（矛盾）を通じて同一性へ」というのに対し、ニーチェは「差異を直接肯定する」——これがドゥルーズの主著『ニーチェと哲学』（1962）の核心的な主張です。

永劫回帰とドゥルーズの「差異と反復」：「同一なものが回帰するのではなく、差異が回帰する」——この解釈は『差異と反復』の核心です。躁と鬱の波が繰り返されるとき、それは同じものの繰り返しではなく、毎回微妙に異なる差異の繰り返しだ——ドゥルーズはそこに生の豊かさを見出します。

あなたの文章との接続：「逃走」というテーマはニーチェ的です。ニーチェも「逃走」を説きましたが、それは「強さから来る逃走（新しい価値を創造するための）」であり、「弱さから来る逃走（現実への怨恨から）」ではありませんでした。あなたが「単なる逃走」と「安全な逃走」を区別するとき、そこにはこのニーチェ的な区別が潜んでいます。`,
},
10: {
  cls:'v10', title:'危機の時代の哲学——現象学', sub:'20世紀前半', period:'1900 – 1950', depth:57,
  depthLabel:'フッサールは概要だけ、ベンヤミンとハイデガーは少し丁寧に',
  tide:`二つの世界大戦という「理性の失敗」の時代。「理性・科学・進歩」への信頼が崩壊し、哲学は「経験そのものへの回帰」を目指します。

フッサールの現象学は「事象そのものへ（Zu den Sachen selbst）」という標語のもと、「意識に現れるものを先入観なく丁寧に記述する」ことを目指しました。「テーブルを見る」という経験を分析するとき、「テーブルが本当に存在するか」は問わない（括弧に入れる、エポケー）——まず経験そのものを記述する。

ハイデガーはこれを「存在とは何か」という問いへと展開します。「なぜ何かがあって、何もないのではないのか」——この問いはドゥルーズとも共鳴しますが、ドゥルーズはハイデガーとは異なる答えに向かいます。

ベンヤミン、アドルノなどのフランクフルト学派は、現代資本主義・大衆文化・ファシズムへの批判的分析を展開しました。`, 
  persons:[
    {name:'フッサール', dates:'1859–1938', color:'#AFA9EC', body:`現象学の創始者。「すべての意識は何かについての意識だ（志向性、intentionality）」——これが現象学の出発点です。私が見るとき、私は必ず「何か」を見ている。意識は常に対象に向かっている。

「エポケー（判断停止）」：世界が実在するかしないかを一旦「括弧に入れ」、意識に現れる現象そのものを純粋に記述する。これにより「純粋意識（超越論的自我）」が現れる——フッサールはここに哲学の確実な出発点を見出しました。

ドゥルーズとの関係は複雑です。ドゥルーズは現象学の「経験への回帰」という姿勢を評価しながら、「フッサールはまだ主体（超越論的自我）を前提にしている」と批判します。主体なき経験、主体以前の差異と生成の場——これを記述しようとするのがドゥルーズの「超越論的経験論」です。`, keys:['志向性','エポケー','超越論的自我','生活世界（レーベンスヴェルト）']},
    {name:'ハイデガー', dates:'1889–1976', color:'#CECBF6', body:`20世紀最大の哲学者の一人であり、ナチスへの加担という問題を抱えた人。主著『存在と時間』は「存在一般の意味を問う存在論」の試みです。

「現存在（Dasein）」：ハイデガーは人間を「意識の主体」ではなく、常に世界の中に投げ込まれた「現存在（そこに在ること）」として捉えます。私たちは先に「意識」があるのではなく、すでに世界の中に「いる」——道具的な関係の網の中に。

「存在と時間」：現存在の根本的な時間性は「死への存在（Sein-zum-Tode）」です。自分の死（最も固有で逃れられない可能性）に向き合うとき、初めて「本来的な実存」が開かれる。

ドゥルーズはハイデガーと対話しながら、「存在」ではなく「差異・生成・出来事」を哲学の中心に置きます。ハイデガーが「存在論的差異（存在と存在者の差異）」を言ったとき、ドゥルーズは「差異そのものを存在として肯定する」という別の方向に向かいます。`, keys:['現存在（Dasein）','存在と時間','世界内存在','道具連関','本来性と非本来性']},
    {name:'ベンヤミン', dates:'1892–1940', color:'#AFA9EC', body:`「複製技術時代の芸術作品」が最も有名な論文。「アウラ（Aura）」——芸術作品の「今・ここ」にしかない一回性と遠さ——が写真・映画などの複製技術によって消滅していくことを分析しました。

ベンヤミンの独自性は「歴史の哲学」にあります。「歴史は進歩しない、歴史は破滅の連続だ（歴史の天使）。抑圧された者たちの記憶は過去に蓄積されている——革命とはその過去を救済することだ」——この「救済の政治神学」はヘーゲル的な進歩史観への根本的な批判です。

あなたの文章でフィールドワークの一つとして登場する「気仙沼・陸前高田」——「復興という正しい物語が個人の記憶を圧殺する」というテーマはベンヤミン的です。「公の記憶（アーカイブ）が個人の記憶（オーラ的体験）を圧倒する」——これをベンヤミンは「歴史の天使」という寓話で描きました。`, keys:['アウラ','複製技術','歴史の天使','救済の政治神学','パサージュ論']},
  ],
  dlz:`この巻でドゥルーズに最も重要な繋がりは二つあります。

フッサールの現象学との関係：ドゥルーズは「超越論的経験論（empirisme transcendantal）」という概念でフッサールを乗り越えようとします。フッサールが「超越論的自我」という主体を前提にしたのに対し、ドゥルーズは「主体に先立つ非人称的な経験の場（差異・強度・生成）」を記述しようとします。

ハイデガーとの関係：ハイデガーが「存在の問いを立て直す」ことを目指したとき、ドゥルーズは「差異の問いを立て直す」ことを目指します。ハイデガーの「現存在は世界内存在だ」という命題——私たちはすでに世界の中にいる——は、ドゥルーズの「内在性の平面」という概念と通底しています。

ベンヤミンとあなたの文章：「復興という正義が飽和する街」というフィールドワークの章は、ベンヤミン的な問いを立てています。「公の記憶（強い社会的意味）が個人の記憶（個人的非意味）を消していく」——ベンヤミンは「歴史の天使」という寓話でこれを描きました。ベンヤミンをフィールドワーク章の補助線として使えるかもしれません。`,
},
11: {
  cls:'v11', title:'論理・数学・言語', sub:'分析哲学', period:'1880 – 1970', depth:15,
  depthLabel:'ほぼ読まなくていい——ウィトゲンシュタインだけ少し',
  tide:`英語圏を中心とした「分析哲学」の流れ。「哲学の問題の多くは、言語の誤用から生じる」という発想のもと、論理・数学・言語を厳密に分析することで哲学を「科学的」にしようとしました。フランス大陸哲学とは全く異なる哲学の「文化圏」です。

フレーゲが現代論理学を作り、ラッセルが数学の論理的基礎づけを試み、ウィトゲンシュタインが「語れないことには沈黙しなければならない」（前期）と言い、後に「言語ゲーム」（後期）を提唱します。ウィーン学団は「形而上学の命題は無意味だ、検証できないから」と言い、科学哲学を打ち立てました。

このシリーズの目標（ドゥルーズを理解すること）においては、最も迂回路の多い巻です。ただしウィトゲンシュタインだけは少し知っておく価値があります。`,
  persons:[
    {name:'ウィトゲンシュタイン', dates:'1889–1951', color:'#9FE1CB', body:`前期と後期で全く異なる哲学を展開した人。前期の主著『論理哲学論考』は「語りうることを語り、語れないことについては沈黙しなければならない」という命題で締めくくられます。言語は事実の論理的な絵であり、倫理・美・神秘については「示される」だけで語れない——。

後期（『哲学探究』）は前期を完全に否定します。「言語の意味は使用によって決まる。言語はゲームのようなものだ（言語ゲーム）。一つの意味を持つ言語ではなく、さまざまな生活形式に根ざした多様な言語ゲームがある」。

ドゥルーズとウィトゲンシュタインは思想的に「別の惑星」にいますが、後期ウィトゲンシュタインの「意味は使用だ、文脈だ、生活形式だ」という発想は、ドゥルーズの「概念は問題と切り離せない、文脈によって意味が変わる」という哲学観と、遠くで響き合います。`, keys:['言語ゲーム','生活形式','語りうることと示されること','論理哲学論考']},
  ],
  dlz:`この巻はドゥルーズへの道においては基本的にスキップして問題ありません。

唯一の例外はウィトゲンシュタインです。「言語は一義的な意味を持つシステムではなく、使用と文脈によって意味が変わる多様なゲームだ」——この発想は、ドゥルーズが概念を「問題（プロブレーム）と切り離せない」として扱う姿勢と共鳴します。「差異と反復」という概念も、読む文脈・使用の仕方によって意味が変わります。

もし読む時間が限られているなら、11巻は後回しにして12巻に直接進んでください。`,
},
12: {
  cls:'v12', title:'実存・構造・他者——ドゥルーズへの到達', sub:'フランス現代哲学', period:'1900 – 1980', depth:100,
  depthLabel:'★★★最終目的地。全力で読む——ベルクソン・フーコー・ドゥルーズの順で',
  tide:`フランス現代哲学の全貌。実存主義（サルトル）から構造主義（レヴィ＝ストロース、ラカン）へ、そしてポスト構造主義（フーコー、デリダ、ドゥルーズ）へ——という大きな流れがあります。

実存主義は「人間は本質なしに実存する、自由に自己を作り出す存在だ」と言いました（サルトル）。構造主義は「いや、個人は言語・文化・無意識の構造に規定されている」と反論しました（レヴィ＝ストロース）。ポスト構造主義はさらに「その構造も固定されていない、差異・生成・権力によって絶えず変化する」と言います（ドゥルーズ、デリダ、フーコー）。

この巻のベルクソンは20世紀初頭の哲学者ですが、ドゥルーズへの直接的な影響という点で最重要です。「持続」「差異」「生命の躍動」——ドゥルーズ哲学の語彙の多くはベルクソンから来ています。`,
  persons:[
    {name:'ベルクソン', dates:'1859–1941', color:'#EF9F27', body:`ドゥルーズが最も多くの著作で論じた哲学者の一人。ドゥルーズは『ベルクソニズム』（1966）を書き、後に映画論（『シネマ』全2巻）でもベルクソンの時間論を軸にします。

「持続（durée）」：時間を空間的に——点の連続として——理解することへの批判。本当の時間は、過去が現在に生き続け、常に変化し続ける「質的な流れ」です。「川を撮った写真をどれだけ並べても、川の流れにはならない」——これが時間の空間化への批判です。

「差異（différence）」：ベルクソンにとって、差異は比較によって生まれるものではなく、内的な差異化の過程そのものです。「生命（élan vital、生の躍動）」は常に自己差異化し続ける過程として定義されます。

ドゥルーズによる読み直し：ドゥルーズはベルクソンを「差異の哲学者」として読みます。「持続＝差異化する時間、記憶＝純粋な過去の潜在性」——これが『差異と反復』の時間論、そして映画論（時間イメージ）の直接の源泉です。`, keys:['持続（durée）','生の躍動（élan vital）','記憶論','純粋持続','潜在性']},
    {name:'サルトル', dates:'1905–1980', color:'#FAC775', body:`「実存は本質に先立つ」——この命題が実存主義の核心です。人間は先に「人間とはこういうものだ」という本質（設計図）があって作られるのではなく、まず実存（存在）し、自由に自己の本質を作り出す。

「自由の刑に処されている」という逆説：人間は自由から逃れられない。何もしないことも選択であり、「選ばない」という選択もある——だからこそ不安（アンゴワス）が生まれる。

ドゥルーズはサルトルを若い頃から読み、その影響を受けながら批判します。「自由な主体」という概念——サルトル的な意識の主体性——に対し、ドゥルーズは「主体に先立つ非人称的な差異の過程」を置きます。「サルトルは主体を解放しようとした、私は主体を解体しようとする」——これがドゥルーズの立場です。`, keys:['実存主義','自由の刑','対自存在と即自存在','他者の視線','アンゴワス']},
    {name:'メルロ＝ポンティ', dates:'1908–1961', color:'#CECBF6', body:`「身体の現象学」の哲学者。「私は身体を持つのではなく、私は身体だ」——精神と身体の二元論を乗り越え、「知覚する身体（corps propre）」を哲学の中心に置きます。

「図と地」：私たちの知覚は常に「注目している何か（図）」と「背景（地）」の構造を持つ。この構造はゲシュタルト心理学から来ていますが、メルロ＝ポンティはこれを存在論的な洞察として発展させます。

あなたの文章との繋がり：「身体の芯が冷えていくような感覚」「脈拍・呼吸・体温で場所を測る」——これはメルロ＝ポンティ的な「生きられた身体（corps vécu）」の記述です。哲学的言語で言えば、あなたのフィールドワーク方法論は「現象学的身体論」に基づいています。`, keys:['知覚の現象学','生きられた身体','図と地','間身体性']},
    {name:'フーコー', dates:'1926–1984', color:'#AFA9EC', body:`ドゥルーズの親友。「権力と知識の関係」「規律権力と生権力」「主体の系譜学」が中心テーマです。

「権力は上から押しつけられるのではなく、毛細血管のように社会全体に浸透している」——刑務所・病院・学校・軍隊という「規律装置」が身体を訓練し、従順な「規律的主体」を作り出す（『監獄の誕生』）。

「知の考古学」：あらゆる時代には、何が「真理」として語られ得るかを決める「エピステーメー（認識の枠組み）」がある。真理は普遍的ではなく、権力と知識の歴史的配置によって変わる。

ドゥルーズはフーコーの権力論を発展させながら、「欲望は権力に対して一次的だ、権力が欲望を産み出すのではなく、欲望が権力関係を産み出す」という逆転を行います（『アンチ・オイディプス』）。また後期のドゥルーズは「フーコーにおける折り返し（プリ）」論文でフーコーを深く論じています。`, keys:['規律権力','知と権力','主体の系譜学','生権力','監獄の誕生']},
    {name:'ドゥルーズ', dates:'1925–1995', color:'#EF9F27', body:`すべての哲学史がここに流れ込みます。

ドゥルーズ哲学を一言で言えば——「差異は同一性に先立つ」。プラトン以来の「同一性の哲学（真のオリジナルがあり、コピーはその似像に過ぎない）」を逆転させ、「差異そのものが一次的であり、同一性は差異の二次的な効果に過ぎない」と主張します。

主著の系譜：『経験論と主体性』（ヒューム）→『ニーチェと哲学』→『カントの批判哲学』→『スピノザと表現の問題』→『差異と反復』→『意味の論理学』——これらは哲学史の読み直しであり、同時に独自の哲学の構築です。

ガタリとの共著：『アンチ・オイディプス』（1972）と『千のプラトー』（1980）は「資本主義・欲望・権力」の政治哲学であり、「リゾーム」「器官なき身体」「脱領土化と再領土化」「リトルネロ」——あなたがすでに参照している概念がすべてここにあります。

「傘」の概念（あなたの文章に登場）：『哲学とは何か』（ガタリとの最後の共著、1991）における「思考はカオスから身を守る傘だ、しかし傘に穴を開けてカオスの一撃を通すことで創造が生まれる」——これがあなたの「スリットの入った傘」の直接の源泉です。`, keys:['差異と反復','内在性の平面','リゾーム','器官なき身体','脱領土化','リトルネロ','傘とカオス']},
  ],
  dlz:`この巻があなたの最終目的地です。読む順番の提案をします。

①まずベルクソンの章——「持続と差異」という概念を掴む。これがドゥルーズの時間論と差異論の直接の源泉です。

②次にフーコーの章——「権力と知識の関係」「規律装置」「主体の系譜学」を理解する。ドゥルーズとフーコーがどこで重なり、どこで分岐するかが見えてきます。

③サルトルの章——実存主義を理解することで「ドゥルーズが何を乗り越えようとしたか」が明確になります。

④最後にドゥルーズの章——鈴木泉による論文を、これまで積み上げてきたすべての文脈を携えて読む。

読み終えたとき、哲学史全体が「ドゥルーズに向かって書かれていた」ように見えるかもしれません。そしてあなた自身の文章も——「躁鬱という臨床的個人が差異と反復の中で安全なカオスを見つけようとする営み」として——この哲学史の延長線上にあることが見えてくるはずです。`,
},
};

let curId = null;
function show(id) {
  const d = VOLS[id];
  if (curId !== null) {
    document.querySelectorAll('.vbtn').forEach((b,i) => {
      if (i+1 === curId) b.classList.remove('active');
    });
  }
  document.querySelectorAll('.vbtn').forEach((b,i) => {
    if (i+1 === id) b.classList.add('active');
  });
  curId = id;

  const persons = d.persons.map(p => `
    <div class="person-card" style="border-left-color:${p.color}">
      <div class="person-name">${p.name}<span class="person-dates">${p.dates}</span></div>
      <div class="person-body">${p.body.replace(/\n\n/g,'<br><br>')}</div>
      <div class="tag-row">${p.keys.map(k=>`<span class="tag">${k}</span>`).join('')}</div>
    </div>
  `).join('');

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="vol-badge ${d.cls}">第${id}巻 · ${d.sub}</div>

        <div class="vol-period">${d.period}</div>
      </div>
      <div class="depth-row">
        <span class="depth-label">読み込み度</span>
        <div class="depth-bg"><div class="depth-fill" style="width:${d.depth}%"></div></div>
        <span class="depth-label">${d.depthLabel}</span>
      </div>
    </div>
    <div class="card">
      <div class="section">
        <div class="section-title">この時代の哲学的潮流</div>
        <div class="body-text">${d.tide.replace(/\n\n/g,'</div><div class="body-text">')}</div>
      </div>
    </div>
    <div class="card">
      <div class="section-title">重要人物と思想</div>
      ${persons}
    </div>
    <div class="card">
      <div class="dlz-box">
        <div class="dlz-title">▶ ドゥルーズ、そしてあなたの文章との繋がり</div>
        <div class="dlz-text">${d.dlz.replace(/\n\n/g,'<br><br>')}</div>
      </div>
    </div>
  `;
  window.scrollTo(0, 0);
}
</script>
